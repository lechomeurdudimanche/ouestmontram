<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Itinéraire – Où est mon tram ?</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --bg-hover: #2a2a2a;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --border: #333;
            --accent: #00d2ff;
            --nav-h: 60px;
            --app-height: 100vh;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { overscroll-behavior: none; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #map {
            position: absolute;
            top: 0; left: 0; right: 0;
            bottom: var(--nav-h);
            z-index: 0;
        }
        .leaflet-control-attribution { background: rgba(255,255,255,0.7) !important; font-size: 9px !important; }
        .leaflet-control-zoom a { background: #fff !important; color: #333 !important; border-color: #ddd !important; }
        .stop-tooltip {
            background: rgba(255,255,255,0.9) !important;
            border: none !important; box-shadow: 0 1px 4px rgba(0,0,0,0.18) !important;
            border-radius: 3px !important; padding: 1px 5px !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 10px !important; font-weight: 600 !important;
            color: #222 !important; white-space: nowrap;
        }
        .stop-tooltip::before { display: none !important; }

        #search-float {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 12px 12px 0;
        }
        #search-card {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 6px 28px rgba(0,0,0,0.55);
        }
        .sf-fields { display: flex; align-items: stretch; }
        .sf-dots {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 0 10px; gap: 3px; flex-shrink: 0;
            border-right: 1px solid var(--border);
        }
        .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .dot-from { background: #888; }
        .dot-to   { background: #e53935; }
        .dot-mid  { width: 1px; height: 15px; background: var(--border); }
        .sf-inputs { flex: 1; min-width: 0; }
        .sf-row {
            display: flex; align-items: center; padding: 10px 10px 10px 12px;
            border-bottom: 1px solid var(--border); gap: 6px;
        }
        .sf-row:last-child { border-bottom: none; }
        .sf-row input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 0.87rem; font-family: inherit; min-width: 0;
        }
        .sf-row input::placeholder { color: var(--text-muted); }
        .geo-btn, .swap-btn {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .geo-btn { background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.28); }
        .geo-btn:active { background: rgba(0,210,255,0.22); }
        .swap-btn { background: var(--bg-hover); border: 1px solid var(--border); }
        .swap-btn:active { background: #333; }

        #search-dropdown {
            background: var(--bg-panel);
            border: 1px solid var(--border); border-top: none;
            border-radius: 0 0 16px 16px;
            max-height: 52vh; overflow-y: auto;
            display: none;
            box-shadow: 0 10px 28px rgba(0,0,0,0.55);
        }
        #search-dropdown.open { display: block; }
        #search-dropdown::-webkit-scrollbar { display: none; }
        .drop-label {
            font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--text-muted); padding: 8px 14px 3px;
        }
        .drop-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 14px; cursor: pointer;
            border-bottom: 1px solid #222; transition: background 0.12s;
        }
        .drop-item:last-child { border-bottom: none; }
        .drop-item:active { background: var(--bg-hover); }
        .drop-icon {
            width: 30px; height: 30px; border-radius: 8px;
            background: #252525; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .drop-info { flex: 1; min-width: 0; }
        .drop-name { font-size: 0.83rem; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drop-sub  { font-size: 0.71rem; color: var(--text-muted); margin-top: 1px; }
        .line-pills { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
        .lp {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 18px; height: 18px; border-radius: 9px; padding: 0 4px;
            font-size: 0.58rem; font-weight: 800; color: white; white-space: nowrap;
        }

        #bottom-sheet {
            position: absolute;
            bottom: var(--nav-h); left: 0; right: 0;
            background: var(--bg-dark);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid var(--border);
            z-index: 110;
            display: flex; flex-direction: column;
            height: 0; overflow: hidden;
            transition: none;
        }
        .sh-handle-area { padding: 8px 0 2px; cursor: grab; flex-shrink: 0; touch-action: none; }
        .sh-handle { width: 36px; height: 4px; background: #3a3a3a; border-radius: 2px; margin: 0 auto; }

        #sheet-results { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        #sheet-results.hidden { display: none; }

        #options-bar {
            display: flex; align-items: center; gap: 7px;
            padding: 9px 14px 9px 16px;
            border-bottom: 1px solid #1a1a1a;
            overflow-x: auto; flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        #options-bar::-webkit-scrollbar { display: none; }

        #refresh-btn {
            display: flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
            background: #1c1c1c; border: 1.5px solid var(--border);
            color: var(--text-muted); cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        #refresh-btn:active { background: #2a2a2a; color: var(--text-main); }
        #refresh-btn.spinning svg { animation: spin 0.55s linear; }

        .opt-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 13px; border-radius: 20px; flex-shrink: 0;
            font-size: 0.75rem; font-weight: 500; cursor: pointer;
            user-select: none; white-space: nowrap;
            border: 1.5px solid var(--border); background: #1c1c1c;
            color: var(--text-muted); transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        .opt-chip:active { background: #252525; }
        .opt-chip.active {
            background: rgba(0,210,255,0.08);
            border-color: rgba(0,210,255,0.45);
            color: var(--accent); font-weight: 600;
        }

        .opt-chip .chip-caret {
            width: 10px; height: 10px; opacity: 0.45; flex-shrink: 0;
            transition: transform 0.2s;
        }
        .opt-chip.popup-open .chip-caret { transform: rotate(180deg); opacity: 0.8; }

        .opt-sep {
            width: 1px; height: 18px; background: #2e2e2e; flex-shrink: 0; border-radius: 1px;
        }

        #opt-backdrop {
            position: fixed; inset: 0;
            z-index: 400;
            background: rgba(0,0,0,0.35);
            opacity: 0; pointer-events: none;
            transition: opacity 0.22s ease;
            backdrop-filter: blur(1px);
        }
        #opt-backdrop.open { opacity: 1; pointer-events: all; }

        #opt-popup {
            position: fixed;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            width: min(400px, calc(100vw - 32px));
            background: #202020;
            border: 1px solid #383838;
            border-radius: 20px;
            z-index: 410;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4);
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.22,1,0.36,1);
            overflow: hidden;
        }
        #opt-popup.open {
            opacity: 1; pointer-events: all;
            transform: translateX(-50%) translateY(0);
        }

        .popup-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 16px 12px;
        }
        .popup-title {
            font-size: 0.95rem; font-weight: 700; color: var(--text-main);
            letter-spacing: -0.01em;
        }
        .popup-close {
            width: 28px; height: 28px; border-radius: 50%;
            background: #2e2e2e; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 1.1rem; line-height: 1;
            flex-shrink: 0; transition: background 0.15s, color 0.15s;
        }
        .popup-close:active { background: #3a3a3a; color: var(--text-main); }

        .popup-divider { height: 1px; background: #2c2c2c; margin: 0 16px; }

        .popup-options { padding: 6px 0 4px; }

        .pop-opt {
            display: flex; align-items: center; gap: 13px;
            padding: 12px 16px; cursor: pointer;
            transition: background 0.1s;
            border-radius: 0;
        }
        .pop-opt:active { background: #272727; }

        .pop-check {
            width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
            border: 2px solid #3a3a3a;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.15s, background 0.15s;
        }
        .pop-check svg { opacity: 0; transition: opacity 0.15s; }
        .pop-opt.selected .pop-check {
            border-color: var(--accent);
            background: var(--accent);
        }
        .pop-opt.selected .pop-check svg { opacity: 1; }

        .pop-opt-body { flex: 1; min-width: 0; }
        .pop-opt-label { font-size: 0.88rem; font-weight: 600; color: var(--text-main); }
        .pop-opt-sub   { font-size: 0.73rem; color: var(--text-muted); margin-top: 2px; font-weight: 400; }

        #pop-time-input-wrap {
            margin: 4px 16px 12px;
            display: none;
        }
        #pop-time-input-wrap.show { display: block; }
        #pop-time-input-wrap label {
            display: block; font-size: 0.72rem; font-weight: 600;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.04em; margin-bottom: 6px;
        }
        #custom-time-input {
            width: 100%; background: #141414; border: 1.5px solid #383838;
            border-radius: 12px; color: var(--text-main); padding: 10px 14px;
            font-size: 0.9rem; font-family: inherit; outline: none;
            transition: border-color 0.15s;
        }
        #custom-time-input:focus { border-color: var(--accent); }

        .pop-confirm-btn {
            display: none; width: calc(100% - 32px); margin: 0 16px 14px;
            padding: 11px; border-radius: 12px; border: none; cursor: pointer;
            background: var(--accent); color: #000; font-weight: 700;
            font-size: 0.88rem; font-family: inherit;
            transition: opacity 0.15s;
        }
        .pop-confirm-btn:active { opacity: 0.8; }
        .pop-confirm-btn.show { display: block; }

        #results-list { flex: 1; overflow-y: auto; padding: 6px 10px 10px; }
        #results-list::-webkit-scrollbar { display: none; }

        .rcard {
            background: #1a1a1a; border: 1px solid #2a2a2a;
            border-radius: 14px; padding: 11px 13px; margin-bottom: 7px;
            cursor: pointer; transition: border-color 0.15s, background 0.12s;
            user-select: none;
            animation: fadeSlide 0.22s cubic-bezier(0.25,0.46,0.45,0.94) both;
        }
        .rcard:nth-child(1) { animation-delay: 0.00s; }
        .rcard:nth-child(2) { animation-delay: 0.05s; }
        .rcard:nth-child(3) { animation-delay: 0.10s; }
        .rcard:nth-child(4) { animation-delay: 0.15s; }
        .rcard:nth-child(5) { animation-delay: 0.20s; }
        .rcard:active { background: #202020; }

        .rc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
        .rc-times { font-size: 0.93rem; font-weight: 700; color: var(--text-main); }
        .rc-dur  { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }

        .jbar { display: flex; align-items: center; gap: 4px; margin-bottom: 7px; flex-wrap: wrap; }
        .jb-walk-icon { font-size: 0.82rem; line-height: 1; }
        .jb-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 22px; height: 22px; border-radius: 11px; padding: 0 5px;
            font-size: 0.6rem; font-weight: 800; color: white; flex-shrink: 0;
        }
        .jb-arrow { font-size: 1rem; color: #555; line-height: 1; }

        .rc-foot { display: flex; gap: 10px; padding-top: 6px; border-top: 1px solid #1e1e1e; flex-wrap: wrap; }
        .rc-foot span { font-size: 0.7rem; color: var(--text-muted); }

        #sheet-detail { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #sheet-detail.active { display: flex; }

        #dv-header {
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px; flex-shrink: 0;
            display: flex; align-items: center; gap: 10px;
        }
        .back-btn {
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; cursor: pointer;
            background: var(--bg-panel); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 1.3rem; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .back-btn:active { background: var(--bg-hover); }
        #dv-summary { flex: 1; }
        .dvs-time { font-size: 0.9rem; font-weight: 700; color: var(--text-main); }
        .dvs-route { font-size: 0.71rem; color: var(--text-muted); margin-top: 2px; }

        #dv-steps { flex: 1; overflow-y: auto; padding: 12px 14px 20px; }
        #dv-steps::-webkit-scrollbar { display: none; }

        .step { display: flex; gap: 12px; margin-bottom: 2px; }
        .step-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 30px; }
        .sdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
        .sdot-from { background: #888; border: 2px solid #888; }
        .sdot-walk { border: 2px solid #444; background: var(--bg-dark); }
        .svline { width: 3px; flex: 1; min-height: 18px; background: #252525; margin: 3px 0; border-radius: 2px; }
        .svline-walk { background: repeating-linear-gradient(to bottom, #444 0, #444 4px, transparent 4px, transparent 8px); }
        .step-body { flex: 1; padding-bottom: 14px; min-width: 0; }
        .step-title { font-size: 0.84rem; font-weight: 600; color: var(--text-main); }
        .step-sub   { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }

        .ts-depart-name {
            font-size: 0.88rem; font-weight: 700; color: var(--text-main);
            margin-bottom: 8px;
        }
        .ts-line-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        .ts-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 26px; height: 26px; border-radius: 13px; padding: 0 6px;
            font-size: 0.66rem; font-weight: 800; color: white; flex-shrink: 0;
        }
        .ts-direction {
            flex: 1; font-size: 0.8rem; color: var(--text-muted); min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .ts-time {
            font-size: 1.55rem; font-weight: 700; color: var(--text-main);
            flex-shrink: 0; letter-spacing: -0.5px; line-height: 1;
        }
        .ts-stops-toggle {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 10px; border-radius: 7px; background: #1a1a1a;
            border: 1px solid #2a2a2a; cursor: pointer; margin-bottom: 6px;
            transition: background 0.12s; user-select: none;
        }
        .ts-stops-toggle:active { background: #222; }
        .ts-toggle-arrow {
            font-size: 0.6rem; color: var(--text-muted);
            transition: transform 0.2s; flex-shrink: 0;
        }
        .ts-stops-toggle.open .ts-toggle-arrow { transform: rotate(180deg); }
        .ts-stops-label { font-size: 0.74rem; color: var(--text-muted); flex: 1; }
        .ts-stops-list {
            display: none; flex-direction: column; gap: 4px;
            padding: 4px 0 6px 10px; border-left: 2px solid #2a2a2a; margin-bottom: 7px;
        }
        .ts-stops-list.open { display: flex; }
        .ts-stop-item { display: flex; align-items: center; gap: 7px; }
        .ts-stop-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid #444; }
        .ts-stop-name { font-size: 0.73rem; color: #888; }
        .ts-arrive-row {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .ts-arrive-name { font-size: 0.88rem; font-weight: 700; color: var(--text-main); }
        .ts-arrive-time { font-size: 0.88rem; font-weight: 600; color: var(--accent); flex-shrink: 0; }

        .step-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 26px; height: 26px; border-radius: 13px; padding: 0 6px;
            font-size: 0.65rem; font-weight: 800; color: white; margin-top: 2px;
        }
        .dest-step .sdot { background: #e53935; border: 2px solid #e53935; }

        body.detail-open #search-card {
            opacity: 0; pointer-events: none;
            transform: translateY(-8px);
            transition: opacity 0.2s, transform 0.2s;
        }
        #search-card { transition: opacity 0.2s, transform 0.2s; }

        .empty-msg { text-align: center; color: var(--text-muted); padding: 28px 20px; font-size: 0.9rem; line-height: 1.5; }
        .loading-msg {
            text-align: center; color: var(--text-muted); padding: 28px 20px; font-size: 0.88rem;
        }
        .loading-msg::before {
            content: ''; display: block; width: 22px; height: 22px;
            border: 2px solid #333; border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.65s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .leaflet-div-icon { background: transparent !important; border: none !important; box-shadow: none !important; }

        #bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: var(--nav-h); background: var(--bg-panel);
            border-top: 1px solid var(--border); z-index: 1000; display: flex;
        }
        .nav-link {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 4px; text-decoration: none;
            color: var(--text-muted); font-size: 0.9rem; transition: color 0.2s;
            position: relative; padding-bottom: env(safe-area-inset-bottom, 0);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .nav-link:hover { background: var(--bg-hover); }
        .nav-link.active { color: var(--accent); }
        .nav-link.active::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 2px; background: var(--accent);
        }
        .nav-icon { font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="search-float">
        <div id="search-card">
            <div class="sf-fields">
                <div class="sf-dots">
                    <div class="dot dot-from"></div>
                    <div class="dot-mid"></div>
                    <div class="dot dot-to"></div>
                </div>
                <div class="sf-inputs">
                    <div class="sf-row">
                        <input type="text" id="input-from" placeholder="Départ" autocomplete="off" autocorrect="off" autocapitalize="off">
                        <button class="geo-btn" id="geo-btn" onclick="ITIN.geolocate()" title="Ma position">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d2ff" stroke-width="2" stroke-linecap="round">
                                <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/>
                                <line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/>
                                <line x1="18" y1="12" x2="22" y2="12"/>
                            </svg>
                        </button>
                    </div>
                    <div class="sf-row">
                        <input type="text" id="input-to" placeholder="Destination" autocomplete="off" autocorrect="off" autocapitalize="off">
                        <button class="swap-btn" onclick="ITIN.swap()" title="Inverser">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.2" stroke-linecap="round">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <polyline points="7 9 12 4 17 9"/>
                                <polyline points="7 15 12 20 17 15"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div id="search-dropdown"></div>
    </div>

    <div id="bottom-sheet">
        <div class="sh-handle-area" id="sh-handle">
            <div class="sh-handle"></div>
        </div>

        <div id="sheet-results">
            <div id="options-bar">
                <button id="refresh-btn" onclick="ITIN.refresh()" title="Relancer la recherche">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"/>

        <div class="popup-header">
            <span class="popup-title" id="popup-title">Options</span>
            <button class="popup-close" onclick="ITIN.closePopup()">
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>

        <a href="index.html" class="nav-link">
            <span class="nav-icon">🕐</span><span>Horaires</span>
        </a>
        <a href="suivi.html" class="nav-link">
            <span class="nav-icon">🚋</span><span>Suivi tram</span>
        </a>
        <a href="itineraire.html" class="nav-link active">
            <span class="nav-icon">🗺️</span><span>Itinéraire</span>
        </a>

            <span class="nav-icon">⚠️</span><span>Infotrafic</span>
        </a>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    const _lineColors     = new Map();
    const _lineTextColors = new Map();

    const lineColor     = n => _lineColors.get(String(n))     || '#777777';
    const lineTextColor = n => _lineTextColors.get(String(n)) || '#ffffff';

    const _PRIORITY_OPERATORS = ['SEM','GSV','SE2','TPV'];

    let _routesPromise = null;
    function fetchAllRoutes() {
        if (!_routesPromise) {
            _routesPromise = fetch('https://data.mobilites-m.fr/api/routers/default/index/routes')
                .then(r => r.ok ? r.json() : [])
                .catch(() => []);
        }
        return _routesPromise;
    }

    function loadRouteColors() {
        return fetchAllRoutes().then(allRoutes => {
            for (const op of _PRIORITY_OPERATORS) {
                for (const route of allRoutes) {
                    if (!route.shortName || !route.color) continue;
                    if (!route.id.startsWith(op + ':')) continue;
                    if (_lineColors.has(route.shortName)) continue;
                    _lineColors.set(route.shortName,     '#' + route.color);
                    _lineTextColors.set(route.shortName, route.textColor ? '#' + route.textColor : '#ffffff');
                }
            }
            for (const route of allRoutes) {
                if (!route.shortName || !route.color) continue;
                if (_lineColors.has(route.shortName)) continue;
                _lineColors.set(route.shortName,     '#' + route.color);
                _lineTextColors.set(route.shortName, route.textColor ? '#' + route.textColor : '#ffffff');
            }
        });
    }
    function lineOrder(n) {
        const s = String(n).toUpperCase();
        const TRAMS = ['A','B','C','D','E'];
        const ti = TRAMS.indexOf(s);
        if (ti !== -1) return ti;
        if (/^C[1-8]$/.test(s)) return 10 + parseInt(s.slice(1));
        if (/^C(9|1[0-4])$/.test(s)) return 20 + parseInt(s.slice(1));
        const num = parseInt(s);
        if (!isNaN(num)) {
            if (num >= 15 && num <= 37) return 30 + num;
            if (num >= 80 && num <= 99) return 70 + num;
            if (num >= 38 && num <= 79) return 110 + num;
            if (num >= 500)             return 200 + (num - 500);
        }
        return 666;
    }
    function sortLines(lines) {
        return [...lines].sort((a, b) => lineOrder(a) - lineOrder(b));
    }

    const legName = leg => {
        if (leg.mode === 'RAIL' || (leg.agencyId && leg.agencyId.startsWith('SNC')))
            return 'TER';
        return leg.routeShortName || leg.route || '';
    };

    function decodePolyline(enc) {
        let i=0,lat=0,lng=0,res=[];
        while(i<enc.length){
            let sh=0,b,rb=0;
            do{b=enc.charCodeAt(i++)-63;rb|=(b&0x1f)<<sh;sh+=5;}while(b>=0x20);
            lat+=(rb&1)?~(rb>>1):(rb>>1);sh=rb=0;
            do{b=enc.charCodeAt(i++)-63;rb|=(b&0x1f)<<sh;sh+=5;}while(b>=0x20);
            lng+=(rb&1)?~(rb>>1):(rb>>1);
            res.push([lat/1e5,lng/1e5]);
        }
        return res;
    }

    function fmtTime(ms) {
        const d=new Date(ms);
        return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    }
    function fmtDur(s) {
        const m=Math.round(s/60);
        return m>=60 ? Math.floor(m/60)+'h'+String(m%60).padStart(2,'0') : m+' min';
    }
    function fmtDist(m) {
        return m<100 ? Math.round(m)+' m' : (Math.round(m/100)/10)+' km';
    }
    function fmtWait(startMs,firstMs) {
        const min=Math.round((firstMs-startMs)/60000);
        return min>1 ? ` · attente ${min} min` : '';
    }
    const APOS_RE = /['‘’‚‛`´]/g;
    function normalizeQuery(s) {
        return s.replace(APOS_RE, "'")
                .toLowerCase()
                .normalize('NFD').replace(/\p{Mn}/gu, '');
    }

    const cleanName = raw => {
        if(!raw) return '';
        const idx=raw.indexOf(',');
        return idx!==-1 ? raw.slice(idx+1).trim() : raw.trim();
    };

    function samplePolyline(coords, intervalM) {
        if(!coords||coords.length<2) return coords||[];
        const pts=[coords[0]];
        let acc=0, nextAt=intervalM;
        for(let i=1;i<coords.length;i++){
            const segLen=L.latLng(coords[i-1]).distanceTo(L.latLng(coords[i]));
            const segStart=acc;
            acc+=segLen;
            while(nextAt<=acc){
                const t=(nextAt-segStart)/segLen;
                pts.push([
                    coords[i-1][0]+t*(coords[i][0]-coords[i-1][0]),
                    coords[i-1][1]+t*(coords[i][1]-coords[i-1][1])
                ]);
                nextAt+=intervalM;
            }
        }
        return pts;
    }

    const _pool = [];

    const ITIN = {
        map: null,
        from: null, to: null,
        timeMode: 'now', customTime: null,
        activeField: null,
        rawItins: [], walkItins: [], sortedItins: [],
        travelMode: 'transit',
        sortMode: 'earliest',
        mapLayers: [], mapZoomHandlers: [],
        stops: [],
        searchTimer: null,
        overviewBounds: null,
        currentBounds: null,
        detailVisible: false,

        init() {
            const setH = () => document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
            setH(); window.addEventListener('resize', setH);

            this.map = L.map('map', { center:[45.1885,5.7245], zoom:13, zoomControl:false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution:'© <a href="https://www.openstreetmap.org/">OSM</a> © <a href="https://carto.com/">CARTO</a>',
                subdomains:'abcd', maxZoom:19
            }).addTo(this.map);
            L.control.zoom({ position:'bottomright' }).addTo(this.map);

            this.map.createPane('tramPane');
            this.map.getPane('tramPane').style.zIndex = '350';
            this.map.getPane('tramPane').style.pointerEvents = 'none';

            const iFrom = document.getElementById('input-from');
            const iTo   = document.getElementById('input-to');
            iFrom.addEventListener('focus', () => { this.activeField='from'; this.openDrop(); });
            iTo.addEventListener('focus',   () => { this.activeField='to';   this.openDrop(); });
            iFrom.addEventListener('input', e => this.onInput(e.target.value));
            iTo.addEventListener('input',   e => this.onInput(e.target.value));
            document.addEventListener('click', e => {
                if(!e.target.closest('#search-float')){ this.activeField=null; this.closeDrop(); }
            });

            this.initSheetDrag();
            loadRouteColors();
            this.loadStops();
        },

        loadStops() {
            const STOP_OPERATORS = new Set(['SEM','GSV','SE2','TPV']);
            const m = new Map();
            fetchAllRoutes().then(allRoutes => {
                const routes = allRoutes
                    .filter(r => r.id && STOP_OPERATORS.has(r.id.split(':')[0]) && r.type !== 'SCOL')
                    .map(r => r.id);
                return Promise.all(routes.map(id =>
                    fetch(`https://data.mobilites-m.fr/api/routers/default/index/routes/${id}/clusters`)
                        .then(r => r.ok ? r.json() : [])
                        .then(data => {
                            const name = id.split(':')[1];
                            for(const s of data){
                                if(m.has(s.code)) m.get(s.code).lines.push(name);
                                else m.set(s.code, { name:s.name, lat:s.lat, lon:s.lon, lines:[name], type:'stop' });
                            }
                        }).catch(()=>{})
                ));
            }).then(()=>{
                const GRID = 0.0036;
                const grouped = new Map();
                for (const s of m.values()) {
                    const normName = normalizeQuery(s.name);
                    const gridLat  = Math.round(s.lat / GRID);
                    const gridLon  = Math.round(s.lon / GRID);
                    const key      = `${normName}|${gridLat}|${gridLon}`;
                    if (grouped.has(key)) {
                        const g = grouped.get(key);
                        for (const l of s.lines) {
                            if (!g.lines.includes(l)) g.lines.push(l);
                        }
                        g._count++;
                        g.lat += (s.lat - g.lat) / g._count;
                        g.lon += (s.lon - g.lon) / g._count;
                    } else {
                        grouped.set(key, { ...s, _count: 1 });
                    }
                }
                this.stops = Array.from(grouped.values());
            });
        },

        loadTramLines() {
            const TRAM_IDS = ['SEM:A','SEM:B','SEM:C','SEM:D','SEM:E'];
            TRAM_IDS.forEach(id => {
                const shortName = id.split(':')[1];
                fetch(`https://data.mobilites-m.fr/api/routers/default/index/routes/${id}/clusters`)
                    .then(r => r.ok ? r.json() : [])
                    .then(stops => {
                        if(!stops||stops.length<2) return;
                        const coords = stops.filter(s=>s.lat&&s.lon).map(s=>[s.lat,s.lon]);
                        if(coords.length<2) return;
                        const c = lineColor(shortName);
                        L.polyline(coords, { color:c, weight:4, opacity:0.35, pane:'tramPane' }).addTo(this.map);
                    }).catch(()=>{});
            });
        },

        openDrop() {
            const hist = this.getHistory();
            const favs = this.getFavs();
            let html = '';
            if(favs.length){ html += '<div class="drop-label">Favoris</div>'; html += favs.map((p,i)=>this.dropItem(p,'fav',i)).join(''); }
            if(hist.length){ html += '<div class="drop-label">Récents</div>'; html += hist.map((p,i)=>this.dropItem(p,'hist',i+100)).join(''); }
            const drop = document.getElementById('search-dropdown');
            if(html){ drop.innerHTML=html; drop.classList.add('open'); }
            else drop.classList.remove('open');
        },

        dropItem(place, src, idx) {
            _pool[idx] = place;
            const ICONS = {
                fav:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>`,
                hist: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>`,
                stop: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><line x1="12" y1="13" x2="12" y2="22"/></svg>`,
                geo:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`,
            };
            const icon = ICONS[src] || ICONS.geo;
            const pills = place.lines
                ? sortLines(place.lines).map(l=>`<span class="lp" style="background:${lineColor(l)};color:${lineTextColor(l)}">${l}</span>`).join('')
                : '';
            return `<div class="drop-item" onclick="ITIN.pick(${idx})">
                <div class="drop-icon">${icon}</div>
                <div class="drop-info">
                    <div class="drop-name">${place.name}</div>
                    ${pills ? `<div class="drop-sub"><div class="line-pills">${pills}</div></div>` : (place.sub?`<div class="drop-sub">${place.sub}</div>`:'')}
                </div>
            </div>`;
        },

        onInput(val) {
            clearTimeout(this.searchTimer);
            const drop = document.getElementById('search-dropdown');
            if(!val.trim()){ this.openDrop(); return; }
            drop.innerHTML = '<div class="loading-msg">Recherche…</div>';
            drop.classList.add('open');
            this.searchTimer = setTimeout(()=>this.search(val), 280);
        },

        async search(val) {
            const lv = normalizeQuery(val);
            const stopHits = this.stops
                .filter(s=>normalizeQuery(s.name).includes(lv)).slice(0,5)
                .map((s,i)=>{ _pool[200+i]=s; return this.dropItem(s,'stop',200+i); });
            let geoHtml = '';
            try {
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val)}&format=json&limit=4&viewbox=5.55,45.28,5.84,45.09&bounded=1&addressdetails=1`;
                const data = await fetch(url,{headers:{'Accept-Language':'fr'}}).then(r=>r.json());
                geoHtml = data.map((item,i)=>{
                    const p = {
                        name: item.display_name.split(',').slice(0,2).join(', '),
                        lat: parseFloat(item.lat), lon: parseFloat(item.lon),
                        sub: item.display_name.split(',').slice(2,4).join(', ').trim(),
                        type: 'address'
                    };
                    _pool[300+i]=p; return this.dropItem(p,'geo',300+i);
                }).join('');
            } catch(e){}
            const drop = document.getElementById('search-dropdown');
            const all = stopHits.join('')+geoHtml;
            drop.innerHTML = all || '<div class="empty-msg">Aucun résultat</div>';
            drop.classList.add('open');
        },

        pick(idx) {
            const place = _pool[idx];
            if(!place) return;
            const field = this.activeField || (this.from ? 'to' : 'from');
            this.closeDrop();
            if(field==='from'){
                this.from = place;
                document.getElementById('input-from').value = place.name;
                if(!this.to) setTimeout(()=>document.getElementById('input-to').focus(), 80);
            } else {
                this.to = place;
                document.getElementById('input-to').value = place.name;
            }
            document.getElementById('input-from').blur();
            document.getElementById('input-to').blur();
            this.saveHist(place);
            if(this.from && this.to) this.plan();
        },

        closeDrop() { document.getElementById('search-dropdown').classList.remove('open'); },

        swap() {
            [this.from,this.to]=[this.to,this.from];
            document.getElementById('input-from').value = this.from ? this.from.name : '';
            document.getElementById('input-to').value   = this.to   ? this.to.name   : '';
            if(this.from && this.to) this.plan();
        },

        geolocate() {
            if(!navigator.geolocation) return;
            const btn = document.getElementById('geo-btn');
            btn.style.opacity='0.4';
            navigator.geolocation.getCurrentPosition(
                pos => {
                    btn.style.opacity='';
                    this.from = { name:'Ma position', lat:pos.coords.latitude, lon:pos.coords.longitude, type:'geo' };
                    const iFrom = document.getElementById('input-from');
                    iFrom.value = 'Ma position';
                    iFrom.blur();
                    this.activeField = null;
                    this.closeDrop();
                    this.map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                    if(this.to) this.plan();
                },
                () => { btn.style.opacity=''; }
            );
        },

        _currentPopup: null,

        _positionPopup() {
            const popup  = document.getElementById('opt-popup');
            const sheet  = document.getElementById('bottom-sheet');
            const navH   = 60;
            const sheetTop = sheet.getBoundingClientRect().top;
            const gap    = 10;
            let bottom   = window.innerHeight - sheetTop + gap;
            const sf     = document.getElementById('search-float');
            const sfBottom = sf ? sf.getBoundingClientRect().bottom : 0;
            const popH   = popup.offsetHeight;
            const maxBottom = window.innerHeight - sfBottom - popH - 8;
            bottom = Math.min(bottom, maxBottom);
            popup.style.bottom = Math.max(navH + 8, bottom) + 'px';
        },

        openPopup(type) {
            if(this._currentPopup === type){ this.closePopup(); return; }
            this._currentPopup = type;
            const popup    = document.getElementById('opt-popup');
            const backdrop = document.getElementById('opt-backdrop');
            const body     = document.getElementById('popup-body');
            const title    = document.getElementById('popup-title');
            const timeWrap = document.getElementById('pop-time-input-wrap');
            const confirmBtn = document.getElementById('pop-confirm-btn');
            timeWrap.classList.remove('show');
            confirmBtn.classList.remove('show');

            document.querySelectorAll('.opt-chip').forEach(c=>c.classList.remove('popup-open'));
            const chip = document.getElementById('chip-'+type);
            if(chip) chip.classList.add('popup-open');

            const checkIcon = `<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>`;

            const optRow = (val, label, sub, sel, handler) =>
                `<div class="pop-opt ${sel?'selected':''}" onclick="ITIN.${handler}('${val}')">
                    <div class="pop-opt-body">
                        <div class="pop-opt-label">${label}</div>
                        <div class="pop-opt-sub">${sub}</div>
                    </div>
                    <div class="pop-check">${checkIcon}</div>
                </div>`;

            if(type==='mode'){
                title.textContent = 'Mode de transport';
                body.innerHTML = [
                    ['transit','Transports en commun','Tram, bus, train...'],
                    ['walk',   'À pied',              'Itinéraire pédestre uniquement'],
                ].map(([val,l,s])=>optRow(val,l,s,this.travelMode===val,'_pickMode')).join('');

            } else if(type==='time'){
                title.textContent = 'Heure du trajet';
                body.innerHTML = [
                    ['now',    'Maintenant', 'Prochain départ disponible'],
                    ['depart', 'Départ à…',  'Choisir l\'heure de départ'],
                    ['arrive', 'Arrivée à…', 'Choisir l\'heure d\'arrivée'],
                ].map(([val,l,s])=>optRow(val,l,s,this.timeMode===val,'_pickTimeMode')).join('');
                if(this.timeMode!=='now') this._showTimeInput();

            } else if(type==='sort'){
                title.textContent = 'Trier les résultats';
                body.innerHTML = [
                    ['earliest', 'Arrivée le plus tôt',     'Heure d\'arrivée la plus proche'],
                    ['fastest',  'Le plus rapide',          'Durée totale minimale'],
                    ['lessWalk', 'Moins de marche',         'Distance à pied minimale'],
                ].map(([val,l,s])=>optRow(val,l,s,this.sortMode===val,'_pickSort')).join('');
            }

            backdrop.classList.add('open');
            popup.classList.add('open');
            requestAnimationFrame(()=>{ this._positionPopup(); });
        },

        _showTimeInput() {
            const timeWrap   = document.getElementById('pop-time-input-wrap');
            const confirmBtn = document.getElementById('pop-confirm-btn');
            const label      = document.getElementById('pop-time-label');
            label.textContent = this.timeMode==='arrive' ? 'Heure d\'arrivée' : 'Heure de départ';
            const inp = document.getElementById('custom-time-input');
            if(!inp.value || !this.customTime){
                const now = new Date(); now.setMinutes(now.getMinutes()+5);
                inp.value = new Date(now - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
            }
            timeWrap.classList.add('show');
            confirmBtn.classList.add('show');
            requestAnimationFrame(()=>{ this._positionPopup(); });
        },

        closePopup() {
            document.getElementById('opt-popup').classList.remove('open');
            document.getElementById('opt-backdrop').classList.remove('open');
            document.querySelectorAll('.opt-chip').forEach(c=>c.classList.remove('popup-open'));
            this._currentPopup = null;
        },


        _pickMode(mode) {
            this.closePopup();
            this.setTravelMode(mode);
        },

        _pickTimeMode(mode) {
            document.querySelectorAll('#popup-body .pop-opt').forEach(o=>{
                const sel = o.getAttribute('onclick').includes(`'${mode}'`);
                o.classList.toggle('selected', sel);
            });
            this.timeMode = mode;
            const timeWrap   = document.getElementById('pop-time-input-wrap');
            const confirmBtn = document.getElementById('pop-confirm-btn');
            if(mode==='now'){
                timeWrap.classList.remove('show');
                confirmBtn.classList.remove('show');
                this.customTime = null;
                document.getElementById('chip-time-label').textContent = 'Maintenant';
                document.getElementById('chip-time').classList.remove('active');
                this.closePopup();
                if(this.from && this.to) this.plan();
            } else {
                this._showTimeInput();
            }
        },

        _pickSort(mode) {
            this.closePopup();
            this.setSort(mode);
        },

        setTravelMode(mode) {
            this.travelMode = mode;
            const labels = { transit:'Transports', walk:'À pied' };
            document.getElementById('chip-mode-label').textContent = labels[mode]||mode;
            document.getElementById('chip-mode').classList.add('active');
            this.applySort();
            const showSort = mode==='transit' && this.rawItins.length>1;
            document.getElementById('chip-sort').style.display  = showSort ? 'inline-flex' : 'none';
            document.getElementById('sep-sort').style.display   = showSort ? 'block' : 'none';
            if(!this.sortedItins.length && this.from && this.to) this.plan();
            else { this.renderResults(); if(this.sortedItins.length>0) this.drawRoute(this.sortedItins[0]); }
        },

        setSort(mode) {
            this.sortMode = mode;
            const labels = { fastest:'Rapide', earliest:'Arrivée tôt', lessWalk:'Moins de marche' };
            document.getElementById('chip-sort-label').textContent = labels[mode]||mode;
            this.applySort();
            this.renderResults();
            if(this.sortedItins.length>0) this.drawRoute(this.sortedItins[0]);
        },

        applySort() {
            const src = this.travelMode==='walk' ? this.walkItins : this.rawItins;
            const arr = [...src];
            if(this.sortMode==='lessWalk') arr.sort((a,b)=>a.walkDistance-b.walkDistance);
            else if(this.sortMode==='earliest') arr.sort((a,b)=>a.endTime-b.endTime);
            else arr.sort((a,b)=>a.duration-b.duration);
            this.sortedItins = arr;
        },

        _fmtTimeChip(ms) {
            const dt = new Date(ms);
            const now = new Date();
            const isToday = dt.toDateString() === now.toDateString();
            const isTomorrow = dt.toDateString() === new Date(now.getTime()+86400000).toDateString();
            const timeStr = fmtTime(ms);
            if(isToday) return timeStr;
            if(isTomorrow) return `Dem. ${timeStr}`;
            return `${dt.getDate()}/${dt.getMonth()+1} ${timeStr}`;
        },

        setTimeMode(mode) {
            this.timeMode = mode;
        },

        onTimeChange(val) {
            this.customTime = val;
            if(val){
                const ms = new Date(val).getTime();
                const prefix = this.timeMode==='arrive' ? 'Arr.' : 'Dép.';
                document.getElementById('chip-time-label').textContent = `${prefix} ${this._fmtTimeChip(ms)}`;
                document.getElementById('chip-time').classList.add('active');
            }
        },

        confirmTime() {
            const val = document.getElementById('custom-time-input').value;
            if(val){
                this.customTime = val;
                const ms = new Date(val).getTime();
                const prefix = this.timeMode==='arrive' ? 'Arr.' : 'Dép.';
                document.getElementById('chip-time-label').textContent = `${prefix} ${this._fmtTimeChip(ms)}`;
                document.getElementById('chip-time').classList.add('active');
            }
            this.closePopup();
            if(this.from && this.to) this.plan();
        },

        refresh() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('spinning');
            btn.addEventListener('animationend', ()=>btn.classList.remove('spinning'), {once:true});
            if(this.from && this.to) this.plan();
        },

        buildUrl(mode) {
            let url = `https://data.mobilites-m.fr/api/routers/default/plan?fromPlace=${this.from.lat},${this.from.lon}&toPlace=${this.to.lat},${this.to.lon}&numItineraries=5&mode=${mode}&showIntermediateStops=true`;
            if(this.customTime){
                const dt=new Date(this.customTime);
                const pad=n=>String(n).padStart(2,'0');
                url+=`&date=${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}&time=${pad(dt.getHours())}:${pad(dt.getMinutes())}&arriveBy=${this.timeMode==='arrive'}`;
            }
            return url;
        },

        async plan() {
            if(!this.from||!this.to) return;
            this.showResultsPanel();
            const list = document.getElementById('results-list');
            list.innerHTML = '<div class="loading-msg">Calcul en cours…</div>';
            this.snapSheet(0.40);
            this.clearRoute();

            try {
                const [tRes, wRes] = await Promise.all([
                    fetch(this.buildUrl('TRANSIT,WALK'),{headers:{origin:'ouestmontram'}}),
                    fetch(this.buildUrl('WALK'),{headers:{origin:'ouestmontram'}})
                ]);
                const tData = tRes.ok ? await tRes.json() : null;
                const wData = wRes.ok ? await wRes.json() : null;

                this.rawItins  = (tData&&tData.plan&&tData.plan.itineraries)
                    ? tData.plan.itineraries.filter(it=>it.legs.some(l=>l.mode!=='WALK'))
                    : [];
                this.walkItins = (wData&&wData.plan&&wData.plan.itineraries) ? wData.plan.itineraries : [];

                if(!this.rawItins.length && this.travelMode==='transit'){
                    this.travelMode='walk';
                    document.getElementById('chip-mode-label').textContent = 'À pied';
                }

                this.applySort();

                const sortChip = document.getElementById('chip-sort');
                const sortSep  = document.getElementById('sep-sort');
                const showSort = this.travelMode==='transit' && this.sortedItins.length>1;
                sortChip.style.display = showSort ? 'inline-flex' : 'none';
                sortSep.style.display  = showSort ? 'block' : 'none';

                this.renderResults();
                if(this.sortedItins.length>0) this.drawRoute(this.sortedItins[0]);
            } catch(e) {
                list.innerHTML = `<div class="empty-msg">Erreur lors du calcul.<br><small style="color:#555">${e.message}</small></div>`;
            }
        },

        renderResults() {
            const list = document.getElementById('results-list');
            if(!this.sortedItins.length){
                list.innerHTML='<div class="empty-msg">Aucun itinéraire trouvé.<br>Essayez l\'autre mode.</div>';
                return;
            }
            list.innerHTML = this.sortedItins.map((itin,i)=>{
                const transLegs = itin.legs.filter(l=>l.mode!=='WALK');
                const firstTrans = transLegs[0];

                let jbar='';
                itin.legs.forEach((leg)=>{
                    if(leg.mode==='WALK'){
                        if(leg.distance >= 250){
                            jbar+=`<span class="jb-walk-icon">🚶‍➡️</span>`;
                        }
                    } else {
                        const n=legName(leg);
                        const c=lineColor(n)||(leg.routeColor?'#'+leg.routeColor:'#777');
                        const tc=lineTextColor(n);
                        if(jbar.length) jbar+=`<span class="jb-arrow">›</span>`;
                        jbar+=`<div class="jb-badge" style="background:${c};color:${tc}">${n}</div>`;
                    }
                });

                const footItems=[];
                if(itin.transfers>0) footItems.push(`${itin.transfers} correspondance${itin.transfers>1?'s':''}`);
                if(itin.walkDistance>100) footItems.push(`${fmtDist(itin.walkDistance)} à pied`);

                return `<div class="rcard" onclick="ITIN.showDetail(${i})">
                    <div class="rc-top">
                        <div>
                            <div class="rc-times">${fmtTime(itin.startTime)} – ${fmtTime(itin.endTime)}</div>
                            <div class="rc-dur">${fmtDur(itin.duration)}</div>
                        </div>
                    </div>
                    <div class="jbar">${jbar}</div>
                    ${footItems.length ? `<div class="rc-foot">${footItems.map(s=>`<span>${s}</span>`).join('')}</div>` : ''}
                </div>`;
            }).join('');
        },

        getVisiblePadding() {
            const sf = document.getElementById('search-float');
            const sh = document.getElementById('bottom-sheet');
            return {
                top:    (sf ? sf.offsetHeight : 0) + 16,
                bottom: (sh ? sh.offsetHeight : 0) + 16
            };
        },

        fitBounds(bounds, opts={}) {
            if(!bounds||!this.map) return;
            const p = this.getVisiblePadding();
            this.map.fitBounds(bounds, {
                paddingTopLeft:     [16, p.top],
                paddingBottomRight: [16, p.bottom],
                maxZoom: opts.maxZoom || 16,
                animate: true, duration: 0.5
            });
        },

        clearRoute() {
            this.mapZoomHandlers.forEach(h=>this.map.off('zoomend',h));
            this.mapZoomHandlers=[];
            this.mapLayers.forEach(l=>{ if(this.map.hasLayer(l)) this.map.removeLayer(l); });
            this.mapLayers=[];
        },

        addStopMarkers(leg) {
            const n=legName(leg);
            const c=lineColor(n)||(leg.routeColor?'#'+leg.routeColor:'#888');
            const allStops=[];
            if(leg.from&&leg.from.lat!=null) allStops.push({name:leg.from.name,lat:leg.from.lat,lon:leg.from.lon,key:true});
            (leg.intermediateStops||[]).forEach(s=>{ if(s.lat!=null) allStops.push({name:s.name,lat:s.lat,lon:s.lon,key:false}); });
            if(leg.to&&leg.to.lat!=null) allStops.push({name:leg.to.name,lat:leg.to.lat,lon:leg.to.lon,key:true});

            const dotGroup      = L.layerGroup().addTo(this.map);
            const keyLabelGroup = L.layerGroup();
            const allLabelGroup = L.layerGroup();

            allStops.forEach(s=>{
                L.circleMarker([s.lat,s.lon],{
                    radius:3.5, color:c, fillColor:'#fff', fillOpacity:1, weight:2, pane:'markerPane'
                }).addTo(dotGroup);

                const tooltip = L.tooltip({ permanent:true, direction:'right', offset:[6,0], opacity:1, className:'stop-tooltip' })
                    .setContent(cleanName(s.name)).setLatLng([s.lat,s.lon]);

                if(s.key) tooltip.addTo(keyLabelGroup);
                else      tooltip.addTo(allLabelGroup);
            });

            const updateLabels = () => {
                const z = this.map.getZoom();
                if(z >= 14) keyLabelGroup.addTo(this.map);
                else if(this.map.hasLayer(keyLabelGroup)) this.map.removeLayer(keyLabelGroup);
                if(z >= 15) allLabelGroup.addTo(this.map);
                else if(this.map.hasLayer(allLabelGroup)) this.map.removeLayer(allLabelGroup);
            };
            this.map.on('zoomend', updateLabels); updateLabels();
            this.mapLayers.push(dotGroup, keyLabelGroup, allLabelGroup);
            this.mapZoomHandlers.push(updateLabels);
        },

        drawWalkDots(coords) {
            const intervalForZoom = () => {
                const z = this.map.getZoom();
                if(z >= 17.5) return 5;
                if(z >= 17) return 15;
                if(z >= 16.5) return 30;
                if(z >= 16) return 40;
                if(z >= 15.5) return 60;
                if(z >= 15) return 90;
                if(z >= 14) return 175;
                if(z >= 13) return 250;
                return 500;
            };

            const layer = L.layerGroup().addTo(this.map);
            const redraw = () => {
                layer.clearLayers();
                samplePolyline(coords, intervalForZoom()).forEach(pt=>{
                    L.circleMarker(pt,{
                        radius:2.5, color:'#4285F4', fillColor:'#4285F4',
                        fillOpacity:1, weight:0, pane:'markerPane'
                    }).addTo(layer);
                });
            };
            redraw();
            this.map.on('zoomend', redraw);
            this.mapZoomHandlers.push(redraw);
            this.mapLayers.push(layer);
        },

        _resolveCoords(leg) {
            if (leg.mode === 'RAIL') {
                const pts = [];
                if (leg.from && leg.from.lat != null)
                    pts.push([leg.from.lat, leg.from.lon]);
                (leg.intermediateStops || []).forEach(s => {
                    if (s.lat != null) pts.push([s.lat, s.lon]);
                });
                if (leg.to && leg.to.lat != null)
                    pts.push([leg.to.lat, leg.to.lon]);
                if (pts.length > 2) return pts;
            }
            if (leg.legGeometry && leg.legGeometry.points)
                return decodePolyline(leg.legGeometry.points);
            return [];
        },

        drawRoute(itin) {
            this.clearRoute();
            const bounds=[];

            itin.legs.forEach((leg, i) => {
                const coords = this._resolveCoords(leg);
                if (!coords || !coords.length) return;
                bounds.push(...coords);

                if(leg.mode==='WALK'){
                    const pl = L.polyline(coords,{ color:'#4285F4', weight:2, opacity:0.25 }).addTo(this.map);
                    this.mapLayers.push(pl);
                    this.drawWalkDots(coords);
                } else {
                    const n=legName(leg);
                    const c=lineColor(n)||(leg.routeColor?'#'+leg.routeColor:'#888');
                    const pl = L.polyline(coords,{ color:c, weight:5, opacity:0.92 }).addTo(this.map);
                    this.mapLayers.push(pl);
                    this.addStopMarkers(leg);
                }
            });

            const start = itin.legs[0];
            const end   = itin.legs[itin.legs.length-1];

            const mkFrom = L.circleMarker([start.from.lat, start.from.lon],{
                radius:7, color:'#555', fillColor:'#888', fillOpacity:1, weight:2, pane:'markerPane'
            }).addTo(this.map);

            const pinIcon = L.divIcon({
                className: '',
                html: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="32" viewBox="0 0 22 32"><path d="M11 0C4.9 0 0 4.9 0 11c0 8.2 11 21 11 21s11-12.8 11-21C22 4.9 17.1 0 11 0z" fill="#e53935"/><circle cx="11" cy="11" r="4" fill="white"/></svg>`,
                iconSize:[22,32], iconAnchor:[11,32]
            });
            const mkTo = L.marker([end.to.lat, end.to.lon],{ icon:pinIcon, pane:'markerPane' }).addTo(this.map);
            this.mapLayers.push(mkFrom, mkTo);

            if(bounds.length>0){
                this.overviewBounds = L.latLngBounds(bounds);
                if(!this.detailVisible) this.fitBounds(this.overviewBounds);
            }
        },

        _getBounds(itin) {
            const pts=[];
            itin.legs.forEach(leg=>{
                if(leg.legGeometry&&leg.legGeometry.points) pts.push(...decodePolyline(leg.legGeometry.points));
            });
            return pts.length ? L.latLngBounds(pts) : null;
        },

        refitMap() {
            if(this.detailVisible && this.currentBounds) this.fitBounds(this.currentBounds,{maxZoom:15});
            else if(!this.detailVisible && this.overviewBounds) this.fitBounds(this.overviewBounds);
        },

        initSheetDrag() {
            const handle = document.getElementById('sh-handle');
            const sheet  = document.getElementById('bottom-sheet');
            if(!handle||!sheet) return;
            let startY, startH;

            const avail  = () => window.innerHeight - 60;
            const snaps  = () => { const a=avail(); return [a*0.12,a*0.45,a*0.95].map(Math.round); };
            const nearest= h => snaps().reduce((p,c)=>Math.abs(c-h)<Math.abs(p-h)?c:p);

            const applySnap = h => {
                sheet.style.transition = 'height 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
                sheet.style.height = nearest(h)+'px';
                setTimeout(()=>{ this.refitMap(); if(this._currentPopup) this._positionPopup(); }, 320);
            };

            handle._snapTo = ratio => {
                sheet.style.transition = 'height 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
                sheet.style.height = Math.round(avail()*ratio)+'px';
                setTimeout(()=>this.refitMap(), 320);
            };

            handle.addEventListener('mousedown', e => {
                startY=e.clientY; startH=sheet.offsetHeight;
                sheet.style.transition='none';
                const mm = e => {
                    const h=Math.max(snaps()[0],Math.min(snaps()[2],startH+(startY-e.clientY)));
                    sheet.style.height=h+'px';
                };
                const mu = () => { applySnap(sheet.offsetHeight); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
                window.addEventListener('mousemove',mm);
                window.addEventListener('mouseup',mu);
            });
            handle.addEventListener('touchstart', e=>{
                startY=e.touches[0].clientY; startH=sheet.offsetHeight;
                sheet.style.transition='none';
            },{passive:true});
            handle.addEventListener('touchmove', e=>{
                e.preventDefault();
                const h=Math.max(snaps()[0],Math.min(snaps()[2],startH+(startY-e.touches[0].clientY)));
                sheet.style.height=h+'px';
            },{passive:false});
            handle.addEventListener('touchend', ()=>applySnap(sheet.offsetHeight));
        },

        snapSheet(ratio) {
            const handle = document.getElementById('sh-handle');
            if(handle&&handle._snapTo) handle._snapTo(ratio);
        },

        showResultsPanel() {
            this.closePopup();
            document.getElementById('sheet-results').classList.remove('hidden');
            document.getElementById('sheet-detail').classList.remove('active');
            this.detailVisible = false;
        },

        showDetail(idx) {
            const itin = this.sortedItins[idx];
            if(!itin) return;

            document.getElementById('dvs-time').textContent  = `${fmtTime(itin.startTime)} – ${fmtTime(itin.endTime)} · ${fmtDur(itin.duration)}`;
            document.getElementById('dvs-route').textContent = `${this.from.name} – ${this.to.name}`;
            document.getElementById('dv-steps').innerHTML = this.buildSteps(itin);

            document.getElementById('sheet-results').classList.add('hidden');
            document.getElementById('sheet-detail').classList.add('active');
            document.body.classList.add('detail-open');
            this.detailVisible = true;

            this.drawRoute(itin);
            this.currentBounds = this._getBounds(itin);
            setTimeout(()=>{ if(this.currentBounds) this.fitBounds(this.currentBounds,{maxZoom:15}); }, 50);
        },

        closeDetail() {
            document.body.classList.remove('detail-open');
            this.showResultsPanel();
            if(this.sortedItins.length>0) this.drawRoute(this.sortedItins[0]);
            setTimeout(()=>{ if(this.overviewBounds) this.fitBounds(this.overviewBounds); }, 50);
        },

        _stepId: 0,

        cleanHeadsign(h) {
            if(!h) return '–';
            const parts = h.split(',');
            return parts[parts.length-1].trim();
        },

        toggleStops(id) {
            const list   = document.getElementById('stops-list-'+id);
            const toggle = document.getElementById('stops-toggle-'+id);
            if(!list||!toggle) return;
            list.classList.toggle('open');
            toggle.classList.toggle('open');
        },

        buildSteps(itin) {
            let html='';
            const legs=itin.legs;
            this._stepId = (this._stepId||0);

            legs.forEach((leg,i)=>{
                const isFirst = i===0;
                const isLast  = i===legs.length-1;

                if(leg.mode==='WALK'){
                    const min  = Math.round(leg.duration/60);
                    const dist = fmtDist(leg.distance);

                    if(isFirst){
                        html+=`<div class="step">
                            <div class="step-col">
                                <div class="sdot sdot-from"></div>
                                <div class="svline svline-walk"></div>
                            </div>
                            <div class="step-body">
                                <div class="step-title">${this.from.name}</div>
                                <div class="step-sub">Marcher ${min} min · ${dist}</div>
                            </div>
                        </div>`;
                    } else if(!isLast){
                        html+=`<div class="step">
                            <div class="step-col">
                                <div class="sdot sdot-walk"></div>
                                <div class="svline svline-walk"></div>
                            </div>
                            <div class="step-body">
                                <div class="step-title">Correspondance</div>
                                <div class="step-sub">${min} min à pied · ${dist}</div>
                            </div>
                        </div>`;
                    }
                } else {
                    const sid  = ++this._stepId;
                    const n    = legName(leg);
                    const c    = lineColor(n)||(leg.routeColor?'#'+leg.routeColor:'#888');
                    const tc   = lineTextColor(n);
                    const inter= leg.intermediateStops||[];
                    const numStops = inter.length + 1;
                    const durMin   = Math.round(leg.duration/60);
                    const dir      = this.cleanHeadsign(leg.headsign);

                    const interHTML = inter.map(s=>`
                        <div class="ts-stop-item">
                            <div class="ts-stop-dot" style="border-color:${c}"></div>
                            <span class="ts-stop-name">${cleanName(s.name)}</span>
                        </div>`).join('');

                    const departName = (i===0) ? this.from.name : cleanName(leg.from.name);

                    html+=`<div class="step">
                        <div class="step-col">
                            <div class="step-badge" style="background:${c};color:${tc}">${n}</div>
                            <div class="svline" style="background:${c};opacity:0.55"></div>
                        </div>
                        <div class="step-body">
                            <div class="ts-depart-name">${departName}</div>
                            <div class="ts-line-row">
                                <div class="ts-badge" style="background:${c};color:${tc}">${n}</div>
                                <span class="ts-direction">Direction : ${dir}</span>
                                <span class="ts-time">${fmtTime(leg.startTime)}</span>
                            </div>
                            ${inter.length>0 ? `
                            <div class="ts-stops-toggle" id="stops-toggle-${sid}" onclick="ITIN.toggleStops(${sid})">
                                <span class="ts-toggle-arrow">▼</span>
                                <span class="ts-stops-label">${numStops} arrêt${numStops>1?'s':''} · ${durMin} min</span>
                            </div>
                            <div class="ts-stops-list" id="stops-list-${sid}">${interHTML}</div>
                            ` : `<div class="ts-stops-label" style="font-size:0.74rem;color:var(--text-muted);margin-bottom:7px">${numStops} arrêt${numStops>1?'s':''} · ${durMin} min</div>`}
                            <div class="ts-arrive-row">
                                <span class="ts-arrive-name">${cleanName(leg.to.name)}</span>
                                <span class="ts-arrive-time">${fmtTime(leg.endTime)}</span>
                            </div>
                        </div>
                    </div>`;
                }
            });

            const last = legs[legs.length-1];
            const arrivalNote = last.mode==='WALK' && last.duration>60
                ? ` · ${Math.round(last.duration/60)} min à pied` : '';
            html+=`<div class="step dest-step">
                <div class="step-col"><div class="sdot"></div></div>
                <div class="step-body">
                    <div class="step-title">${this.to.name}</div>
                    <div class="step-sub">Arrivée ${fmtTime(itin.endTime)}${arrivalNote}</div>
                </div>
            </div>`;

            return html;
        },

        getHistory(){ try{ return JSON.parse(localStorage.getItem('itin_hist')||'[]'); }catch{ return []; } },
        getFavs()   { try{ return JSON.parse(localStorage.getItem('itin_favs')||'[]'); }catch{ return []; } },
        saveHist(p) {
            try {
                const h=this.getHistory().filter(x=>x.name!==p.name);
                h.unshift({name:p.name,lat:p.lat,lon:p.lon,sub:p.sub||'',lines:p.lines||null,type:p.type});
                localStorage.setItem('itin_hist',JSON.stringify(h.slice(0,5)));
            } catch {}
        }
    };

    document.addEventListener('DOMContentLoaded', ()=>ITIN.init());
    </script>

    <script>
        if('serviceWorker' in navigator){
            navigator.serviceWorker.register('/ouestmontram/sw.js').catch(()=>{});
        }
    </script>
</body>

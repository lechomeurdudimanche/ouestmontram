<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://lechomeurdudimanche.github.io/ouestmontram/logo.png" type="image/png">
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script>
        function setAppHeight() {
            document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
    </script>
    <style>
        :root {
            --bg-dark:    #121212;
            --bg-panel:   #1e1e1e;
            --bg-hover:   #2d2d2d;
            --bg-card:    #1e1e1e;
            --text-main:  #f5f5f5;
            --text-muted: #a0a0a0;
            --border:     #333;
            --accent:     #00d2ff;
            --nav-h:      60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        html { overscroll-behavior: none; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            height: var(--app-height, 100vh);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #vc {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .view {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: var(--nav-h);
            display: none;
            -webkit-overflow-scrolling: touch;
        }
        .view::-webkit-scrollbar { width: 0; }

        @keyframes slideInRight  { from { transform: translateX(60%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutLeft   { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30%); opacity: 0; } }
        @keyframes slideOutRight  { from { transform: translateX(0); opacity: 1; } to { transform: translateX(60%); opacity: 0; } }
        @keyframes slideInLeft   { from { transform: translateX(-30%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        #bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: var(--nav-h); background: var(--bg-panel);
            border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-buttons { display: flex; height: 100%; }
        .nav-link {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px; text-decoration: none;
            color: var(--text-muted); font-size: .9rem;
            transition: all .2s; position: relative;
        }
        .nav-link.active { color: var(--accent); }
        .nav-link.active::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 0px; background: var(--accent);
        }
        .nav-icon { display: flex; align-items: center; justify-content: center; }

        .tabs-wrap { padding: 0 16px 14px; }
        .tabs {
            display: flex; background: var(--bg-panel);
            border-radius: 100px; padding: 3px; position: relative;
        }
        .tab-pill {
            position: absolute; top: 3px; left: 3px;
            width: calc(50% - 3px); height: calc(100% - 6px);
            background: var(--text-main);
            border-radius: 100px;
            transition: transform .28s cubic-bezier(.4,0,.2,1);
            pointer-events: none;
        }
        .tabs[data-tab="upcoming"] .tab-pill { transform: translateX(100%); }
        .tab-btn {
            flex: 1; border: none; background: none;
            padding: 10px 0;
            font-size: 0.86rem; font-weight: 600;
            border-radius: 100px; cursor: pointer;
            position: relative; z-index: 1;
            transition: color .25s; letter-spacing: -0.01em;
        }
        .tab-btn.is-active { color: var(--bg-dark); }
        .tab-btn:not(.is-active) { color: var(--text-muted); }

        .back-row {
            position: sticky; top: 0; z-index: 20;
            background: var(--bg-dark);
            padding: 4px 6px 0;
        }
        .back-btn {
            background: none; border: none;
            color: var(--text-muted);
            padding: 12px 14px;
            cursor: pointer;
            display: inline-flex; align-items: center;
            transition: opacity .15s;
        }
        .back-btn:active { opacity: .5; }

        #view-line {
            overflow: hidden;
            flex-direction: column;
        }
        #line-header { flex-shrink: 0; }
        #line-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        #line-scroll::-webkit-scrollbar { width: 0; }

        .skel {
            background: linear-gradient(90deg, var(--bg-hover) 25%, #252530 50%, var(--bg-hover) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }
        .skel-circle { border-radius: 50%; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }

        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 56px 30px; text-align: center; gap: 7px;
        }
        .empty-state-title { font-size: 1rem; font-weight: 600; color: var(--text-main); }
        .empty-state-sub { font-size: 0.83rem; color: var(--text-muted); line-height: 1.5; }

        .dis-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin: 0 16px 10px;
            overflow: hidden;
            animation: fadeUp .3s ease both;
        }
        .dis-card-top { padding: 14px 16px 12px; }
        .dis-card-title { font-weight: 600; font-size: 0.9rem; color: var(--text-main); line-height: 1.4; margin-bottom: 6px; }
        .dis-card-dates { font-size: 0.7rem; font-weight: 600; color: var(--accent); line-height: 1.5; }
        .dis-card-divider { height: 1px; background: var(--border); margin: 0 16px; }
        .dis-card-body {
            padding: 10px 16px 13px;
            font-size: 0.83rem; line-height: 1.65;
            color: var(--text-muted); word-wrap: break-word;
        }
        .dis-card-link {
            display: inline-flex; align-items: center; gap: 5px;
            margin-top: 8px; color: var(--accent);
            font-size: 0.78rem; font-weight: 600; text-decoration: none;
            background: rgba(0,210,255,.08); border-radius: 8px; padding: 5px 10px;
        }

        .section-lbl {
            padding: 20px 16px 10px;
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-muted);
        }
        .section-lbl:first-child { padding-top: 14px; }

        .main-title {
            padding: 28px 16px 20px;
            font-size: 2.2rem; font-weight: 800;
            letter-spacing: -0.02em; color: var(--text-main);
        }

        .delay-entry {
            margin: 0 16px 0;
            background: linear-gradient(120deg, #7b2ff7 0%, #4a90d9 50%, #00c9a7 100%);
            border-radius: 22px;
            padding: 0;
            display: flex; align-items: stretch;
            cursor: pointer;
            transition: transform .18s, box-shadow .18s;
            animation: fadeUp .3s ease;
            position: relative; overflow: hidden;
            min-height: 90px;
            box-shadow: 0 8px 32px rgba(123,47,247,0.25);
        }
        .delay-entry:active { transform: scale(0.98); }
        .delay-entry-body {
            flex: 1; min-width: 0;
            padding: 22px 20px;
            display: flex; align-items: center;
            position: relative; z-index: 1;
        }
        .delay-entry-title {
            font-size: 1.1rem; font-weight: 800;
            color: #fff;
            line-height: 1.3;
            letter-spacing: -0.01em;
        }
        .delay-entry-right {
            width: 130px; flex-shrink: 0;
            position: relative; overflow: hidden;
        }
        .delay-entry-deco {
            position: absolute; inset: 0; pointer-events: none;
        }
        .delay-entry-deco svg {
            position: absolute; inset: 0; width: 100%; height: 100%;
        }
        .delay-entry-arr {
            position: absolute;
            right: 18px; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; border-radius: 50%;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }
        .delay-entry-arr svg { color: #4a90d9; }

        .net-title {
            padding: 24px 16px 14px;
            font-size: 1.35rem; font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-main);
        }
        .badge-group { margin-bottom: 24px; }
        .badge-group-lbl {
            padding: 0 16px 12px;
            font-size: 1rem; font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
            display: flex; align-items: center; gap: 8px;
        }
        .badge-group-lbl svg { flex-shrink: 0; }
        .badge-row { padding: 0 16px; display: flex; flex-wrap: wrap; gap: 12px; }
        .line-badge {
            min-width: 46px; height: 46px;
            padding: 0 10px;
            border-radius: 23px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem;
            cursor: pointer; border: none;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,.4);
            opacity: 0.92;
            transition: transform .15s, opacity .15s, box-shadow .15s;
            animation: fadeUp .3s ease both;
            flex-shrink: 0; position: relative;
        }
        .line-badge:active { transform: scale(.92); opacity: 1; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
        .line-badge.is-tram {
            border-radius: 50%;
            width: 46px; height: 46px; min-width: 46px; padding: 0;
            font-size: 1rem; font-weight: 800;
        }

        .badge-skel-wrap { padding: 0 12px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }

        .line-hero {
            padding: 6px 16px 18px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            text-align: center;
        }
        .line-hero-badge {
            width: 64px; height: 64px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.5rem; color: white;
            box-shadow: 0 4px 18px rgba(0,0,0,.5);
        }
        .line-hero-name {
            font-size: 1.35rem; font-weight: 700;
            letter-spacing: -0.03em; color: var(--text-main);
        }

        .line-update {
            margin: 14px 16px 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            font-size: 0.7rem; color: var(--text-muted);
        }

        .delay-situation {
            padding: 4px 16px 18px;
            font-size: 0.72rem; color: var(--text-muted);
            font-weight: 500;
        }

        .delay-view-title {
            padding: 18px 16px 4px;
            font-size: 1.4rem; font-weight: 700;
            letter-spacing: -0.03em;
        }

        .delay-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            margin: 0 16px 14px;
            overflow: hidden;
            animation: fadeUp .35s ease both;
        }
        .delay-card-head {
            padding: 18px 18px 16px;
            display: flex; gap: 14px; align-items: flex-start;
        }
        .delay-badge {
            width: 54px; height: 54px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.15rem; color: white;
            box-shadow: 0 3px 12px rgba(0,0,0,.45);
            flex-shrink: 0; margin-top: 2px;
        }
        .delay-card-info { flex: 1; min-width: 0; }
        .delay-diag {
            font-size: 1.05rem; font-weight: 700;
            line-height: 1.38; letter-spacing: -0.015em;
        }
        .delay-diag.diag-ok       { color: #4caf50; }
        .delay-diag.diag-slight   { color: #ffc107; }
        .delay-diag.diag-moderate { color: #ff9800; }
        .delay-diag.diag-critical { color: #f44336; }
        .delay-diag.diag-loading  { color: var(--text-muted); font-weight: 500; font-style: italic; }
        .delay-extra-msgs {
            margin-top: 8px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .delay-extra-msg { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
        .delay-tram-count { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }

        .delay-toggle {
            width: 100%; border: none;
            border-top: 1px solid var(--border);
            background: var(--bg-hover);
            padding: 13px 18px;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.83rem; font-weight: 600;
            color: var(--text-muted); cursor: pointer;
            transition: background .15s;
        }
        .delay-toggle:active { background: var(--border); }
        .delay-toggle-arrow { transition: transform .25s ease; flex-shrink: 0; }
        .delay-card.is-open .delay-toggle-arrow { transform: rotate(180deg); }

        .delay-details {
            max-height: 0; overflow: hidden;
            transition: max-height .35s cubic-bezier(.4,0,.2,1);
            border-top: 0 solid var(--border);
        }
        .delay-card.is-open .delay-details {
            max-height: 9999px;
            border-top: 1px solid var(--border);
        }

        .delay-stats {
            padding: 16px 18px 12px;
            display: flex; flex-direction: column; gap: 11px;
        }
        .delay-stat-row {
            display: flex; align-items: baseline;
            justify-content: space-between; gap: 10px;
        }
        .delay-stat-lbl { font-size: 0.8rem; color: var(--text-muted); flex: 1; }
        .delay-stat-val { font-size: 0.92rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }

        .delay-dir {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            border-top: 1px solid var(--border);
        }
        .delay-dir:last-child { border-bottom: none; }
        .delay-dir-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 7px; color: var(--text-main); }
        .delay-dir-stats { display: flex; gap: 16px; flex-wrap: wrap; }
        .delay-dir-stat { font-size: 0.8rem; color: var(--text-muted); }
        .delay-dir-stat b { font-weight: 700; color: var(--text-main); }

        .delay-nodata { padding: 14px 18px; font-size: 0.82rem; color: var(--text-muted); }

        .ponct-trip {
            display: flex; flex-direction: column;
            padding: 10px 14px 10px 34px;
            border-bottom: 1px solid rgba(255,255,255,0.035);
            gap: 6px;
        }
        .ponct-trip:last-child { border-bottom: none; }
        .ponct-trip-top { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .ponct-trip-delay { font-weight: 700; font-size: 0.8rem; flex-shrink: 0; }
        .ponct-trip-id { font-size: 0.65rem; color: #444; font-family: monospace; margin-left: auto; flex-shrink: 0; }
        .ponct-trip-pos { overflow: hidden; }
        .ponct-trip-pos .radar-info {
            font-size: .82rem; color: var(--accent);
            background: rgba(0,210,255,0.1);
            padding: 6px 10px; border-radius: 6px;
            display: flex; align-items: center; gap: 6px;
            min-width: 0;
        }
        .ponct-trip-pos .radar-info b { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; font-weight: 600; }

        .delay-ok     { color: #4caf50; }
        .delay-slight { color: #ffc107; }
        .delay-moderate { color: #ff9800; }
        .delay-heavy  { color: #f44336; }

    </style>
</head>
<body>

<div id="vc">
    <div id="view-main" class="view" style="display:block">
        <div class="main-title">Infotrafic</div>

        <div class="tabs-wrap">
            <div class="tabs" id="main-tabs" data-tab="today">
                <div class="tab-pill"></div>
                <button class="tab-btn is-active" data-tab-target="today" onclick="app.setMainTab('today')">Aujourd'hui</button>
                <button class="tab-btn" data-tab-target="upcoming" onclick="app.setMainTab('upcoming')">À venir</button>
            </div>
        </div>

        <div id="delay-entry-wrap">
            <div class="delay-entry" onclick="app.goToDelay()">
                <div class="delay-entry-body">
                    <div class="delay-entry-title">Retards des trams<br>en temps réel</div>
                </div>
                <div class="delay-entry-right">
                    <div class="delay-entry-deco">
                        <svg viewBox="0 0 130 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                            <g transform="translate(18,22) rotate(-8)">
                                <rect x="0" y="0" width="70" height="22" rx="7" fill="rgba(255,255,255,0.15)"/>
                                <g transform="translate(10,11)">
                                    <polygon points="0,-6 5.5,4 -5.5,4" fill="none" stroke="rgba(255,200,60,0.9)" stroke-width="1.5" stroke-linejoin="round"/>
                                    <line x1="0" y1="-2" x2="0" y2="1" stroke="rgba(255,200,60,0.9)" stroke-width="1.5" stroke-linecap="round"/>
                                    <circle cx="0" cy="3" r="0.8" fill="rgba(255,200,60,0.9)"/>
                                </g>
                                <rect x="22" y="7" width="38" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
                                <rect x="22" y="14" width="25" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
                            </g>
                            <g transform="translate(10,55) rotate(5)">
                                <rect x="0" y="0" width="58" height="20" rx="6" fill="rgba(255,255,255,0.12)"/>
                                <g transform="translate(10,10)">
                                    <circle cx="0" cy="0" r="5.5" fill="none" stroke="rgba(100,230,150,0.9)" stroke-width="1.5"/>
                                    <polyline points="-2.5,0 -0.5,2 3,-2" fill="none" stroke="rgba(100,230,150,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </g>
                                <rect x="20" y="6" width="30" height="3.5" rx="1.75" fill="rgba(255,255,255,0.25)"/>
                                <rect x="20" y="12" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
                            </g>
                        </svg>
                    </div>
                    <div class="delay-entry-arr">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="net-title">Infotrafic du réseau</div>
        <div id="main-badges"></div>
    </div>

    <div id="view-line" class="view">
        <div id="line-header">
            <div class="back-row">
                <button class="back-btn" onclick="app.goBack()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                </button>
            </div>

            <div class="line-hero">
                <div class="line-hero-badge" id="lv-badge"></div>
                <div class="line-hero-name" id="lv-name"></div>
            </div>

            <div class="tabs-wrap">
                <div class="tabs" id="line-tabs" data-tab="today">
                    <div class="tab-pill"></div>
                    <button class="tab-btn is-active" data-tab-target="today" onclick="app.setLineTab('today')">Aujourd'hui</button>
                    <button class="tab-btn" data-tab-target="upcoming" onclick="app.setLineTab('upcoming')">À venir</button>
                </div>
            </div>
        </div>

        <div id="line-scroll">
            <div id="lv-content"></div>
            <div id="lv-update" style="display:none" class="line-update"></div>
        </div>
    </div>

    <div id="view-delay" class="view">
        <div class="back-row">
            <button class="back-btn" onclick="app.goBack()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
        </div>
        <div class="delay-view-title">Retards des trams</div>
        <div class="delay-situation" id="delay-situation" style="display:none"></div>
        <div id="delay-content"></div>
    </div>

</div>

        </a>
        <a href="itineraire.html" class="nav-link">
            <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></span><span>Itinéraire</span>

function normalizeId(raw) { return (raw || '').replace('_', ':'); }

function getLineInfo(raw) {
    const id = normalizeId(raw);
    return ALL_LINES.find(l => l.id === id) || null;
}

function parseDate(s) {
    if (!s) return null;
    try {
        const [date, time] = s.split(' ');
        const [d, m, y] = date.split('/');
        const [h, min] = (time || '00:00').split(':');
        return new Date(+y, +m-1, +d, +h, +min);
    } catch(e) { return null; }
}

function isToday(dateStr) {
    const d = parseDate(dateStr);
    if (!d) return false;
    const n = new Date();
    return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
}

function isUnknownEnd(dateFin) { return !dateFin || dateFin.includes('2050'); }

function fmtDateLabel(s) {
    try {
        const [date, time] = s.split(' ');
        const [d, m, y] = date.split('/');
        const dt = new Date(+y, +m-1, +d);
        const dayName = dt.toLocaleDateString('fr-FR', { weekday: 'long' });
        const dayCapital = dayName.charAt(0).toUpperCase() + dayName.slice(1);
        return `${dayCapital} ${d}/${m}/${y} ${time}`;
    } catch(e) { return s; }
}

function cleanText(text) {
    if (!text) return '';
    let t = text.replace(/<[^>]*>/g, '');
    t = t.replace(/\r\n|\r|\n/g,' ').trim();
    t = t.replace(/^[àÀa]\s+partir\s+du\s+\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2}\s*\|\s*[Jj]usqu['\u2019']au\s+\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2}\s*/gi,'');
    t = t.replace(/^[Jj]usqu['\u2019']au\s+\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}\s+\d{1,2}:\d{2}\s*/g,'');
    t = t.replace(/^[AÀa]\s+partir\s+du\s+\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}\s+\d{1,2}:\d{2}\s*/gi,'');
    t = t.replace(/^[Dd]u\s+\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}\s+\d{1,2}:\d{2}\s+au\s+\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}\s+\d{1,2}:\d{2}\s*/g,'');
    t = t.replace(/^\s*\|+\s*/g,'').replace(/\s*\|+\s*$/g,'').replace(/\|/g,'');
    t = t.replace(/\s+/g,' ').trim();
    if (!t) return '';
    t = t.charAt(0).toUpperCase() + t.slice(1);
    t = t.replace(/\.\s+([A-Z])/g,'.<br>$1');
    return t;
}

function lineSortIndex(raw) {
    const id = normalizeId(raw);
    const i = ALL_LINES.findIndex(l => l.id === id);
    return i === -1 ? 9999 : i;
}

function sortByLine(a, b) {
    return lineSortIndex(a.listeLigne) - lineSortIndex(b.listeLigne);
}
function sortCurrent(a, b) {
    const li = sortByLine(a, b); if (li !== 0) return li;
    const ea = parseDate(a.dateFin), eb = parseDate(b.dateFin);
    if (ea && eb) return ea - eb; if (ea) return -1; if (eb) return 1; return 0;
}
function sortUpcoming(a, b) {
    const li = sortByLine(a, b); if (li !== 0) return li;
    const sa = parseDate(a.dateDebut), sb = parseDate(b.dateDebut);
    if (sa && sb) return sa - sb; if (sa) return -1; if (sb) return 1; return 0;
}

function analyzeLine(directions, nowSec, clusters, lineShort, allStoptimes) {
    const dirEntries = Object.entries(directions).filter(([, trips]) => trips.length > 0);
    const totalTrips = dirEntries.reduce((s, [, t]) => s + t.length, 0);
    if (totalTrips === 0) return null;

    const clusterTripIndex = [];
    for (let ci = 0; ci < allStoptimes.length; ci++) {
        const tripMap = new Map();
        for (const pattern of (allStoptimes[ci] || [])) {
            if (pattern.pattern.id.split(':')[1] !== lineShort) continue;
            for (const t of pattern.times) {
                if (!t.tripId) continue;
                tripMap.set(t.tripId, {
                    sched: t.scheduledDeparture ?? t.scheduledArrival,
                    rt:    t.realtimeDeparture  ?? t.realtimeArrival
                         ?? t.scheduledDeparture ?? t.scheduledArrival,
                    dirDesc: pattern.pattern.desc || ''
                });
            }
        }
        clusterTripIndex.push(tripMap);
    }

    let sumG        = 0;
    let pairCount   = 0;
    let maxRealHwSec = 0;
    let blockageBonus = 0;
    const blockageAlerts = [];
    const _devPairs = [];

    for (const [dirName, trips] of dirEntries) {
        const sorted = trips
            .filter(t => t.positionIdx != null)
            .sort((a, b) => b.positionIdx - a.positionIdx);

        if (sorted.length < 2) continue;

        const seenPairs = new Set();

        for (let i = 0; i < sorted.length - 1; i++) {
            const frontTrip = sorted[i];
            const rearTrip  = sorted[i + 1];

            if (!rearTrip) { _devPairs.push({ skipped: true, dir: dirName, reason: 'pas de tram derrière' }); continue; }

            const pairKey = `${frontTrip.tripId}|${rearTrip.tripId}`;
            if (seenPairs.has(pairKey)) { _devPairs.push({ skipped: true, dir: dirName, reason: `doublon ${pairKey}` }); continue; }

            const frontFuture = frontTrip.schedule
                .filter(s => s.hasRealtime && s.realtimeSec > nowSec)
                .sort((a, b) => a.realtimeSec - b.realtimeSec);

            let frontTime = null, rearTime = null, refStopName = null;

            for (const stop of frontFuture) {
                const ci = stop.clusterIdx;
                if (ci == null || !clusterTripIndex[ci]) continue;
                const idx = clusterTripIndex[ci];
                const ft  = idx.get(frontTrip.tripId);
                const rt  = idx.get(rearTrip.tripId);
                if (ft && rt && ft.sched != null && rt.sched != null) {
                    frontTime = ft; rearTime = rt; refStopName = stop.stopName; break;
                }
            }

            if (!frontTime || !rearTime) {
                _devPairs.push({ skipped: true, dir: dirName, reason: `aucun arrêt commun trouvé pour ${pairKey}` });
                continue;
            }

            seenPairs.add(pairKey);

            const schedHwMin = (rearTime.sched - frontTime.sched) / 60;
            const realHwMin  = (rearTime.rt    - frontTime.rt)    / 60;

            if (schedHwMin <= 0 || realHwMin < 0) {
                _devPairs.push({ skipped: true, dir: dirName, reason: `headway invalide sched=${schedHwMin.toFixed(2)} real=${realHwMin.toFixed(2)}` });
                continue;
            }

            const ratio = Math.min(realHwMin / schedHwMin, 10);
            const diff  = realHwMin - schedHwMin;
            let G       = Math.round(ratio * diff * 100) / 100;

            const frontDelayMin = (frontTrip.delay ?? 0) / 60;
            if (frontDelayMin >= 10 && G < 13) G = 13;

            sumG += G;
            pairCount++;
            _devPairs.push({ dir: dirName, stop: refStopName, realHwMin, schedHwMin, ratio, diff, G });

            if (realHwMin * 60 > maxRealHwSec) maxRealHwSec = realHwMin * 60;
        }

        for (let i = 0; i < sorted.length; i++) {
            const headDelayMin = (sorted[i].delay ?? 0) / 60;
            if (headDelayMin < 10) continue;

            const behind = sorted.slice(i + 1);
            if (behind.length < 2) continue;

            let consecutive = 0;
            let prevDelay = headDelayMin;
            for (let j = 0; j < behind.length; j++) {
                const d = (behind[j].delay ?? 0) / 60;
                if (d < prevDelay) { consecutive++; prevDelay = d; }
                else break;
            }

            if (consecutive >= 2) {
                const nextStop = sorted[i].schedule.find(s => s.hasRealtime && s.realtimeSec > nowSec);
                if (nextStop) {
                    blockageAlerts.push(
                        `Un potentiel blocage de la circulation a lieu vers ${nextStop.stopName} en direction de ${dirName}.`
                    );
                    blockageBonus += 5;
                }
            }
        }
    }

    if (pairCount === 0) return null;

    const avgG = sumG / pairCount + blockageBonus;
    const totalG = Math.round(avgG * 100) / 100;

    const maxWaitMin = Math.round(maxRealHwSec / 60);
    const waitMin  = `Temps d'attente maximum\u00a0: ${maxWaitMin} minute${maxWaitMin > 1 ? 's' : ''}.`;
    const waitWarn = `Temps d'attente maximum\u00a0: ${maxWaitMin} minute${maxWaitMin > 1 ? 's' : ''} (durée susceptible de s'allonger).`;

    let mainMsg, severity;
    if (totalG < 2) {
        mainMsg  = 'La circulation est fluide sur la ligne. Bon voyage\u00a0;)';
        severity = 'ok';
    } else if (totalG < 4) {
        mainMsg  = 'La circulation est fluide sur la ligne.';
        severity = 'ok';
    } else if (totalG < 7) {
        mainMsg  = 'La ligne est légèrement retardée.';
        severity = 'slight';
    } else if (totalG < 10) {
        mainMsg  = 'La ligne est retardée.';
        severity = 'moderate';
    } else if (totalG < 12) {
        mainMsg  = 'La ligne est retardée. Prévoyez du temps supplémentaire pour vos déplacements.';
        severity = 'moderate';
    } else if (totalG < 15) {
        mainMsg  = 'La ligne est fortement retardée. Prévoyez du temps supplémentaire pour vos déplacements.';
        severity = 'critical';
    } else {
        mainMsg  = 'La ligne est très fortement retardée. Privilégiez une autre ligne pour vos déplacements.';
        severity = 'critical';
    }

    const messages = [mainMsg, ...blockageAlerts];
    if (totalG >= 30) {
        messages.push(totalG < 35 ? waitMin : waitWarn);
    }

    return { messages, severity, totalTrips, _totalG: totalG, _devPairs };
}

        const fromEl = document.getElementById(this.currentView);
        const toEl   = document.getElementById(toId);
        if (!toEl || fromEl === toEl) return;

        const enterAnim = dir === 'fwd' ? 'slideInRight' : 'slideInLeft';
        const exitAnim  = dir === 'fwd' ? 'slideOutLeft' : 'slideOutRight';

        toEl.style.display = (toId === 'view-line') ? 'flex' : 'block';

            const ls = document.getElementById('line-scroll');
            if (ls) ls.scrollTop = 0;
        } else { toEl.scrollTop = 0; }
        toEl.style.animation = `${enterAnim} .32s cubic-bezier(.4,0,.2,1) both`;
        fromEl.style.animation = `${exitAnim} .32s cubic-bezier(.4,0,.2,1) both`;

        setTimeout(() => {
            fromEl.style.display = 'none';
            fromEl.style.animation = '';
            toEl.style.animation = '';
            this.currentView = toId;
        }, 330);

    setLineTab(tab) {
        if (this.lineTab === tab) return;
        this.lineTab = tab;
        this._updateTabs('line-tabs', tab);
        this.renderLineContent();
    },

    _updateTabs(tabsId, tab) {
        const tabs = document.getElementById(tabsId);
        if (!tabs) return;
        tabs.dataset.tab = tab;
        tabs.querySelectorAll('.tab-btn').forEach(btn => {
            const isActive = btn.dataset.tabTarget === tab;
            btn.classList.toggle('is-active', isActive);
        });
    },

    _updateDelaySituation() {
        const el = document.getElementById('delay-situation');
        if (!el || !this.ponctLoadedAt) return;
        const d = this.ponctLoadedAt;
        const date = d.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'});
        const time = d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}).replace(':', 'h');
        el.textContent = `Situation au ${date} à ${time}`;
        el.style.display = '';
    },

    goToDelay() {
        this._navigate('view-delay', 'fwd');
        this._updateDelaySituation();
        this._initDelayView();
    },

    openLineView(lineId, fromTab) {
        this._openLineView(lineId, fromTab);
        this._navigate('view-line', 'fwd');
    },

    _openLineView(lineId, fromTab) {
        this.currentLineId = lineId;
        this.lineTab = fromTab || 'today';
        this._updateTabs('line-tabs', this.lineTab);

        const info = getLineInfo(lineId);
        const badge = document.getElementById('lv-badge');
        const nameEl = document.getElementById('lv-name');

        if (info) {
            badge.style.background = info.color;
            badge.style.color = info.textColor;
            badge.textContent = info.name;
            nameEl.textContent = 'Ligne ' + info.name;
        } else {
            badge.style.background = '#888';
            badge.style.color = '#fff';
            badge.textContent = lineId.split(':')[1] || '?';
            nameEl.textContent = 'Ligne ' + (lineId.split(':')[1] || lineId);
        }

        this.renderLineContent();
        this._updateLineTimestamp();
    },

    async loadDisruptions() {
        try {
            const res = await fetch('https://data.mobilites-m.fr/api/dyn/evtTC/json');
            const data = await res.json();
            const now = new Date();

            if (!data || Object.keys(data).length === 0) {
                this.allCurrent = []; this.allFuture = [];
                this.renderMainBadges();
                return;
            }

            const all = Object.values(data).filter(d => {
                const info = getLineInfo(d.listeLigne);
                if (!info || !d.visibleTC) return false;
                if (!isUnknownEnd(d.dateFin)) {
                    const end = parseDate(d.dateFin);
                    if (end && now > end) return false;
                }
                return true;
            });

            this.allCurrent = [];
            this.allFuture  = [];
            all.forEach(d => {
                const start = parseDate(d.dateDebut);
                if (!start || now >= start) this.allCurrent.push(d);
                else                         this.allFuture.push(d);
            });
            this.allCurrent.sort(sortCurrent);
            this.allFuture.sort(sortUpcoming);
            this.lastUpdate = new Date();
            this.renderMainBadges();
            if (this.currentView === 'view-line' && this.currentLineId) {
                this.renderLineContent();
                this._updateLineTimestamp();
            }
        } catch(e) {
            console.error('Infotrafic load error:', e);
            document.getElementById('main-badges').innerHTML =
                '<div class="empty-state"><div class="empty-state-title">Erreur de chargement</div><div class="empty-state-sub">Vérifiez votre connexion.</div></div>';
        }
    },

    _renderBadgeSkeleton() {
        const el = document.getElementById('main-badges');
        el.innerHTML = `<div class="badge-skel-wrap">${[...Array(8)].map(() =>
            `<div class="skel skel-circle" style="width:44px;height:44px;"></div>`
        ).join('')}</div>`;
    },

    renderMainBadges() {
        const el = document.getElementById('main-badges');
        const tab = this.mainTab;

        let relevant;
        if (tab === 'today') {
            relevant = [
                ...this.allCurrent,
                ...this.allFuture.filter(d => isToday(d.dateDebut))
            ];
        } else {
            const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
            const ongoingMultiDay = this.allCurrent.filter(d => {
                if (isUnknownEnd(d.dateFin)) return true;
                const end = parseDate(d.dateFin);
                return end && end > todayEnd;
            });
            relevant = [
                ...ongoingMultiDay,
                ...this.allFuture.filter(d => !isToday(d.dateDebut))
            ];
        }

        const linesWithDis = new Set(relevant.map(d => normalizeId(d.listeLigne)));

        if (linesWithDis.size === 0) {
            el.innerHTML = `<div class="empty-state">
                <div class="empty-state-title">Trafic normal</div>
                <div class="empty-state-sub">Aucune perturbation ${tab === 'today' ? "aujourd'hui" : 'à venir'}.</div>
            </div>`;
            return;
        }

        const TRAM_ICON = '<svg width="22" height="26" viewBox="0 0 20 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3,16 L3,7 Q3,1 10,1 Q17,1 17,7 L17,16 Q17,19 14,19.5 Q10,20 6,19.5 Q3,19 3,16 Z"/><line x1="4" y1="5" x2="16" y2="5"/><path d="M3,14 Q10,17 17,14"/><circle cx="10" cy="17.5" r="0.9" fill="currentColor" stroke="none"/><line x1="7.5" y1="20" x2="4" y2="24"/><line x1="12.5" y1="20" x2="16" y2="24"/></svg>';
        const BUS_ICON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 2 7"/><path d="M10 6h4"/><path d="m22 7-2-1"/><rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16"/><path d="M8 15h.01"/><path d="M16 15h.01"/><path d="M6 19v2"/><path d="M18 21v-2"/></svg>';
        let html = '';
        let delay = 0;
        LINE_GROUPS.forEach(group => {
            const groupLines = group.lines.filter(l => linesWithDis.has(l.id));
            if (!groupLines.length) return;
            const icon = group.key === 'tram' ? TRAM_ICON : BUS_ICON;
            html += `<div class="badge-group">
                <div class="badge-group-lbl">${icon}${group.label}</div>
                <div class="badge-row">`;
            groupLines.forEach(line => {
                const isTram = group.key === 'tram';
                html += `<button class="line-badge${isTram ? ' is-tram' : ''}"
                    style="background:${line.color}; color:${line.textColor}; animation-delay:${delay}ms"
                    onclick="app.openLineView('${line.id}', '${tab}')">${line.name}</button>`;
                delay += 20;
            });
            html += `</div></div>`;
        });

        el.innerHTML = html;
    },

    renderLineContent() {
        const el = document.getElementById('lv-content');
        const lid = this.currentLineId;
        const tab = this.lineTab;
        if (!lid || !el) return;

        const curLine        = this.allCurrent.filter(d => normalizeId(d.listeLigne) === lid);
        const futureToday    = this.allFuture.filter(d => normalizeId(d.listeLigne) === lid && isToday(d.dateDebut));
        const futureUpcoming = this.allFuture.filter(d => normalizeId(d.listeLigne) === lid && !isToday(d.dateDebut));

        const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
        const ongoingMultiDay = curLine.filter(d => {
            if (isUnknownEnd(d.dateFin)) return true;
            const end = parseDate(d.dateFin);
            return end && end > todayEnd;
        });

        let html = '';

        if (tab === 'today') {
            const enCours = curLine;
            const plusTard = futureToday;
            if (!enCours.length && !plusTard.length) {
                html = `<div class="empty-state">
                    <div class="empty-state-title">Trafic normal</div>
                    <div class="empty-state-sub">Aucune perturbation aujourd'hui sur cette ligne.</div>
                </div>`;
            } else {
                if (enCours.length) {
                    html += `<div class="section-lbl">En cours</div>`;
                    enCours.forEach((d, i) => { html += this._renderDisCard(d, i); });
                }
                if (plusTard.length) {
                    html += `<div class="section-lbl">Plus tard dans la journée</div>`;
                    plusTard.forEach((d, i) => { html += this._renderDisCard(d, i); });
                }
            }
        } else {
            const upcomingAll = [...ongoingMultiDay, ...futureUpcoming];
            if (!upcomingAll.length) {
                html = `<div class="empty-state">
                    <div class="empty-state-title">Aucune perturbation à venir</div>
                    <div class="empty-state-sub">Aucune perturbation programmée sur les prochains jours.</div>
                </div>`;
            } else {
                html += `<div class="section-lbl">Prochainement</div>`;
                upcomingAll.forEach((d, i) => { html += this._renderDisCard(d, i); });
            }
        }

        el.innerHTML = html;
    },

    _renderDisCard(d, i) {
        const info = getLineInfo(d.listeLigne);
        let titre = (d.titre || 'Perturbation');
        titre = titre.charAt(0).toUpperCase() + titre.slice(1);
        const desc = cleanText(d.description || d.texte || '');
        const ddebut = fmtDateLabel(d.dateDebut);
        const unknownEnd = isUnknownEnd(d.dateFin);
        const dfin = unknownEnd ? null : fmtDateLabel(d.dateFin);

        const sameDay = !unknownEnd && d.dateDebut && d.dateFin &&
            d.dateDebut.split(' ')[0] === d.dateFin.split(' ')[0];

        let datesHtml;
        if (unknownEnd) {
            datesHtml = `Depuis le ${ddebut}`;
        } else if (sameDay) {
            const timeDebut = d.dateDebut.split(' ')[1];
            const timeFin = d.dateFin.split(' ')[1];
            const datePart = ddebut.substring(0, ddebut.lastIndexOf(' '));
            datesHtml = `${datePart} de ${timeDebut} à ${timeFin}`;
        } else {
            datesHtml = `Du ${ddebut} au ${dfin}`;
        }

        return `<div class="dis-card" style="animation-delay:${i*45}ms">
            <div class="dis-card-top">
                <div class="dis-card-title">${titre}</div>
                <div class="dis-card-dates">${datesHtml}</div>
            </div>
            ${desc ? `<div class="dis-card-divider"></div>
            <div class="dis-card-body">${desc}${d.plan ? `<br><a href="${d.plan}" class="dis-card-link">EN SAVOIR +</a>` : ''}</div>` : ''}
        </div>`;
    },

    _updateLineTimestamp() {
        const el = document.getElementById('lv-update');
        if (!el || !this.lastUpdate) return;
        const d = this.lastUpdate;
        const txt = d.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'})
            + ' à ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}).replace(':', 'h');
        el.textContent = 'Mis à jour le ' + txt;
        el.style.display = '';
    },

    _initDelayView() {
        const el = document.getElementById('delay-content');
        if (!el) return;

        el.innerHTML = LINES_TRAM.map((line, i) => {
            const safe = line.id.replace(':', '-');
            return `<div class="delay-card" id="dc-${safe}" style="animation-delay:${i*55}ms">
                <div class="delay-card-head">
                    <div class="delay-badge" style="background:${line.color}; color:${line.textColor}">${line.name}</div>
                    <div class="delay-card-info">
                        <div class="delay-line-lbl">Ligne ${line.name}</div>
                        <div class="delay-diag diag-loading" id="dc-diag-${safe}">Chargement des données...</div>
                    </div>
                </div>
            </div>`;
        }).join('');

        if (!this.ponctLoading && Object.keys(this.ponctClusters).length === 0) {
            this._loadPonctAll();
        } else if (Object.keys(this.ponctClusters).length > 0) {
            LINES_TRAM.forEach(line => {
                if (!this.ponctData[line.id]) this._loadLineDetail(line.id);
                else this._renderDelayCard(line.id);
            });
        }
    },

    async _loadPonctAll() {
        this.ponctLoading = true;
        this.ponctClusters = {};

        await Promise.all(LINES_TRAM.map(async line => {
            try {
                const res = await fetch(`https://data.mobilites-m.fr/api/routers/default/index/routes/${line.id}/clusters`);
                this.ponctClusters[line.id] = await res.json().then(c => Array.isArray(c) ? c : []);
            } catch(e) {
                this.ponctClusters[line.id] = [];
            }
        }));

        this.ponctLoading = false;
        this.ponctLoadedAt = new Date();
        this._updateDelaySituation();

        LINES_TRAM.forEach(line => this._loadLineDetail(line.id));
    },

    async _loadLineDetail(lineId) {
        if (this.ponctLineLoading.has(lineId)) return;
        const clusters = this.ponctClusters[lineId];
        if (!clusters || clusters.length === 0) {
            this.ponctData[lineId] = { directions: {}, total: 0, loadedAt: Date.now() };
            this._renderDelayCard(lineId);
            return;
        }

        this.ponctLineLoading.add(lineId);
        const lineShort = lineId.split(':')[1];

        try {
            const allStoptimes = await Promise.all(
                clusters.map(c =>
                    fetch(`https://data.mobilites-m.fr/api/routers/default/index/clusters/${c.code}/stoptimes`)
                        .then(r => r.ok ? r.json() : []).catch(() => [])
                )
            );

            let serviceDay = 0;
            outer: for (const stops of allStoptimes) {
                for (const pattern of stops) {
                    for (const t of pattern.times) {
                        if (t.serviceDay) { serviceDay = t.serviceDay; break outer; }
                    }
                }
            }
            const nowSec = this._getNowSec(serviceDay);
            const tripMap = new Map();

            for (let ci = 0; ci < allStoptimes.length; ci++) {
                const stopName = clusters[ci].name;
                for (const pattern of allStoptimes[ci]) {
                    if (pattern.pattern.id.split(':')[1] !== lineShort) continue;
                    const rawDesc = pattern.pattern.desc || '';
                    const direction = rawDesc.includes(' > ')
                        ? rawDesc.split(' > ').slice(1).join(' > ').trim()
                        : rawDesc;
                    for (const t of pattern.times) {
                        if (!t.tripId || t.realtimeState !== 'UPDATED') continue;
                        const scheduledSec = t.scheduledDeparture ?? t.scheduledArrival;
                        const hasRealtime  = t.realtimeDeparture != null || t.realtimeArrival != null;
                        const realtimeSec  = t.realtimeDeparture  ?? t.realtimeArrival ?? scheduledSec;
                        if (!tripMap.has(t.tripId)) {
                            tripMap.set(t.tripId, { tripId: t.tripId, direction, schedule: [] });
                        }
                        tripMap.get(t.tripId).schedule.push({
                            stopName, clusterIdx: ci, scheduledSec, realtimeSec, hasRealtime,
                            serviceDay: t.serviceDay || serviceDay,
                            delay: t.departureDelay ?? t.arrivalDelay ?? (realtimeSec - scheduledSec)
                        });
                    }
                }
            }

            for (const [tid, trip] of tripMap) {
                trip.schedule.sort((a,b) => a.scheduledSec - b.scheduledSec);
                const hasPast   = trip.schedule.some(s => s.scheduledSec <= nowSec);
                const hasFuture = trip.schedule.some(s => s.scheduledSec > nowSec && s.scheduledSec <= nowSec + 7200);
                if (!hasPast && !hasFuture) { tripMap.delete(tid); continue; }
                const firstFuture = trip.schedule.find(s => s.scheduledSec > nowSec);
                const lastPassed  = [...trip.schedule].reverse().find(s => s.scheduledSec <= nowSec);
                const refStop     = firstFuture ?? lastPassed;
                trip.delay        = refStop ? refStop.delay : 0;
                const nextStop    = trip.schedule.find(s => s.realtimeSec > nowSec);
                trip.positionIdx  = nextStop
                    ? nextStop.clusterIdx
                    : (trip.schedule[trip.schedule.length-1]?.clusterIdx ?? 9999);
            }

            const directions = {};
            for (const trip of tripMap.values()) {
                if (!directions[trip.direction]) directions[trip.direction] = [];
                directions[trip.direction].push(trip);
            }
            for (const arr of Object.values(directions)) {
                const sample = arr.find(t => t.schedule.length >= 2);
                const isReverse = sample
                    ? sample.schedule[sample.schedule.length-1].clusterIdx < sample.schedule[0].clusterIdx
                    : false;
                arr.sort((a,b) => isReverse ? b.positionIdx - a.positionIdx : a.positionIdx - b.positionIdx);
            }

            this.ponctData[lineId] = { directions, total: tripMap.size, loadedAt: Date.now(), allStoptimes };
        } catch(e) {
            console.warn('Ponct error', lineId, e);
            this.ponctData[lineId] = { directions: {}, total: 0, loadedAt: Date.now(), allStoptimes: [] };
        }

        this.ponctLineLoading.delete(lineId);
        this._renderDelayCard(lineId);
    },

    _renderDelayCard(lineId) {
        const safe = lineId.replace(':', '-');
        const card = document.getElementById(`dc-${safe}`);
        if (!card) return;

        const data = this.ponctData[lineId];
        const line = LINES_TRAM.find(l => l.id === lineId);
        if (!line) return;

        if (!data) {
            card.querySelector(`#dc-diag-${safe}`).textContent = 'Données indisponibles.';
            return;
        }

        const trips = Object.values(data.directions).flat();
        const nowSec = this._getNowSec(trips[0]?.schedule?.[0]?.serviceDay || 0);
        const lineShort = lineId.split(':')[1];
        const clusters  = this.ponctClusters[lineId] || [];
        const allStoptimes = data.allStoptimes || [];
        const analysis = trips.length ? analyzeLine(data.directions, nowSec, clusters, lineShort, allStoptimes) : null;
        const gs = trips.length ? this._ponctStats(trips) : null;

        const _noDataMsg = (() => {
            const now = new Date();
            const hour = parseInt(now.toLocaleString('fr-FR', { timeZone: 'Europe/Paris', hour: 'numeric', hour12: false }), 10);
            return (hour >= 2 && hour < 4)
                ? 'Aucun tram ne circule sur le réseau à cette heure.'
                : 'L\'application ne reçoit pas de données temps réel.';
        })();
        const mainMsg   = analysis ? analysis.messages[0]
                        : trips.length > 0 ? 'L\'application reçoit trop peu de données temps réel.'
                        : _noDataMsg;
        const severity  = analysis ? analysis.severity : 'loading';
        const extraMsgs = analysis ? analysis.messages.slice(1) : [];

        let extraHtml = '';
        if (extraMsgs.length) {
            extraHtml = `<div class="delay-extra-msgs">${extraMsgs.map(m =>
                `<div class="delay-extra-msg">${m}</div>`
            ).join('')}</div>`;
        }

        const tramCountHtml = trips.length
            ? `<div class="delay-tram-count">${trips.length} tram${trips.length>1?'s':''} en circulation</div>`
            : '';

        let dirsHtml = '';
        Object.entries(data.directions).forEach(([dir, dtrips]) => {
            if (!dtrips.length) return;
            const ds = this._ponctStats(dtrips);
            const tripsHtml = dtrips.map(trip => `
                <div class="ponct-trip">
                    <div class="ponct-trip-top">
                        <span class="ponct-trip-delay ${this._delayCls(trip.delay)}">${this._fmtDelay(trip.delay)}</span>
                        <span class="ponct-trip-id">${trip.tripId}</span>
                    </div>
                    ${this._getPonctPositionHtml(trip.schedule)}
                </div>`).join('');
            dirsHtml += `<div class="delay-dir">
                <div class="delay-dir-name">Vers ${dir}</div>
                ${ds ? `<div class="delay-dir-stats">
                    <div class="delay-dir-stat">${dtrips.length} tram${dtrips.length>1?'s':''}</div>
                    <div class="delay-dir-stat">Moyenne : <span class="${this._delayCls(ds.mean)}">${this._fmtDelayPlain(ds.mean)}</span></div>
                    <div class="delay-dir-stat">Retard max : <span class="${this._delayCls(ds.worst)}">${this._fmtDelayPlain(ds.worst)}</span></div>
                </div>` : ''}
            </div>
            <div class="ponct-trips" style="display:block">${tripsHtml}</div>`;
        });

        const detailsHtml = gs ? `
            <div class="delay-stats">
                <div class="delay-stat-row">
                    <span class="delay-stat-lbl">Moyenne des retards de la ligne</span>
                    <span class="delay-stat-val ${this._delayCls(gs.mean)}">${this._fmtDelayPlain(gs.mean)}</span>
                </div>
                <div class="delay-stat-row">
                    <span class="delay-stat-lbl">Retard maximum de la ligne</span>
                    <span class="delay-stat-val ${this._delayCls(gs.worst)}">${this._fmtDelayPlain(gs.worst)}</span>
                </div>
            </div>
            <div class="delay-directions">${dirsHtml || '<div class="delay-nodata">Pas de détail par direction disponible.</div>'}</div>
        ` : `<div class="delay-nodata">Pas de données temps réel disponibles.</div>`;

        this._devG = this._devG || {};
        this._devG[safe] = analysis ? analysis._totalG : null;
        this._devPairs = this._devPairs || {};
        this._devPairs[safe] = analysis ? analysis._devPairs : [];
        this._badgeClicks = this._badgeClicks || {};
        this._badgeClicks[safe] = { count: 0, timer: null };

        card.innerHTML = `
            <div class="delay-card-head">
                <div class="delay-badge" style="background:${line.color}; color:${line.textColor}; cursor:pointer;" onclick="app._devBadgeClick('${safe}')">${line.name}</div>
                <div class="delay-card-info">
                    <div class="delay-diag diag-${severity}">${mainMsg}</div>
                    ${tramCountHtml}
                    ${extraHtml}
                </div>
            </div>
            <button class="delay-toggle" onclick="app.toggleDelayCard('${safe}')">
                <span>Afficher les détails</span>
                <svg class="delay-toggle-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="delay-details" id="dc-det-${safe}">
                ${detailsHtml}
            </div>`;
    },

    toggleDelayCard(safe) {
        const card = document.getElementById(`dc-${safe}`);
        if (!card) return;
        const isOpen = card.classList.toggle('is-open');
        const btn = card.querySelector('.delay-toggle span');
        if (btn) btn.textContent = isOpen ? 'Masquer les détails' : 'Afficher les détails';
    },

    _devBadgeClick(safe) {
        this._badgeClicks = this._badgeClicks || {};
        if (!this._badgeClicks[safe]) this._badgeClicks[safe] = { count: 0, timer: null };
        const state = this._badgeClicks[safe];
        clearTimeout(state.timer);
        state.count++;
        if (state.count >= 10) {
            state.count = 0;
            const G = this._devG?.[safe];
            const pairs = this._devPairs?.[safe] || [];
            const lineId = safe.replace('-', ':');
            let msg = `[DEV] Ligne ${lineId}\nG moyen = ${G !== null && G !== undefined ? G.toFixed(4) : 'N/A'}\n`;
            msg += `\nDétail paires (${pairs.length}) :\n`;
            pairs.forEach((p, i) => {
                if (p.skipped) {
                    msg += `#${i+1} [${p.dir}] IGNORÉE — ${p.reason}\n`;
                } else {
                    msg += `#${i+1} [${p.dir}@${p.stop ?? '?'}] realHw=${p.realHwMin.toFixed(2)} schedHw=${p.schedHwMin.toFixed(2)} ratio=${p.ratio.toFixed(3)} diff=${p.diff.toFixed(2)} G=${p.G.toFixed(2)}\n`;
                }
            });
            alert(msg);
        } else {
            state.timer = setTimeout(() => { state.count = 0; }, 2000);
        }
    },

    _getNowSec(serviceDay = 0) {
        if (serviceDay) return Math.floor(Date.now() / 1000) - serviceDay;
        const n = new Date();
        let s = n.getHours() * 3600 + n.getMinutes() * 60 + n.getSeconds();
        if (n.getHours() < 4) s += 86400;
        return s;
    },

    _getPonctPositionHtml(schedule) {
        if (!schedule || schedule.length === 0)
            return `<div class="ponct-trip-pos"><div class="radar-info">Position inconnue</div></div>`;
        const serviceDay = schedule[0]?.serviceDay || 0;
        const now = this._getNowSec(serviceDay);
        let lastPassed = null, nextStop = null;
        for (const s of schedule) {
            if (s.realtimeSec <= now) lastPassed = s;
            else if (!nextStop) nextStop = s;
        }
        const display = nextStop || lastPassed;
        if (display)
            return `<div class="ponct-trip-pos"><div class="radar-info">Tram vers <b>${display.stopName}</b></div></div>`;
        return `<div class="ponct-trip-pos"><div class="radar-info">Position inconnue</div></div>`;
    },

    _ponctStats(trips) {
        if (!trips.length) return null;
        const delays = trips.map(t => t.delay);
        const mean  = Math.round(delays.reduce((s,d) => s+d, 0) / delays.length);
        const worst = [...delays].sort((a,b) => a-b)[delays.length-1];
        return { mean, worst, count: delays.length };
    },

    _delayCls(s) {
        if (s <= 30)  return 'delay-ok';
        if (s <= 60)  return 'delay-slight';
        if (s <= 180) return 'delay-moderate';
        return 'delay-heavy';
    },

    _fmtDelay(s) {
        if (s > -30 && s <= 30) return `<span class="delay-ok">À l'heure</span>`;
        const abs = Math.abs(s), m = Math.floor(abs/60), sec = abs%60, sign = s<0?'-':'+';
        const str = m>0 ? `${sign}${m} min${sec>0?' '+String(sec).padStart(2,'0'):''}` : `${sign}${sec}s`;
        return `<span class="${this._delayCls(s)}">${str}</span>`;
    },

    _fmtDelayPlain(s) {
        if (s > -30 && s <= 30) return 'À l\'heure';
        const abs = Math.abs(s);
        const m   = Math.floor(abs / 60);
        const sec = abs % 60;
        const sign = s < 0 ? '-' : '+';
        if (m > 0) return `${sign}${m} min${sec > 0 ? ' ' + String(sec).padStart(2,'0') : ''}`;
        return `${sign}${sec}s`;
    },
};

document.addEventListener('DOMContentLoaded', () => {
    app.init();

    history.pushState({ it: 'app' }, '');
    let handling = false;
    window.addEventListener('popstate', () => {
        if (handling) return; handling = true;
        history.go(1);
        setTimeout(() => {
            handling = false;
            if (app.currentView !== 'view-main') app.goBack();
        }, 50);
    });
});
</script>

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/ouestmontram/sw.js")
        .then(() => console.log("Service Worker enregistré"));
}
</script>
